<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AXIM TradeStation</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container" id="launcher">
      <h1>AXIM TradeStation</h1>

      <div id="auto-connect" class="panel" style="display:none;">
        <p id="auto-connect-message">Connecting...</p>
        <button id="change-link" type="button" class="link-button">Change server settings</button>
      </div>

      <form id="config-form" class="panel" style="display:none;">
        <p class="hint">Choose how this device connects to AXIM.</p>

        <label class="option">
          <input type="radio" name="mode" value="local" checked />
          <span>
            <strong>Run AXIM locally on this PC</strong>
            <small>This machine is the AXIM Server - it executes trades, connects to Telegram and the broker, and stores the database.</small>
          </span>
        </label>

        <label class="option">
          <input type="radio" name="mode" value="remote" />
          <span>
            <strong>Connect to a remote AXIM Server</strong>
            <small>Use this on a laptop/PC that should control an AXIM Server running elsewhere (e.g. your Mini PC), over a private Tailscale network. Trades always execute on the server, never here.</small>
          </span>
        </label>

        <div id="server-address-field" style="display:none;">
          <label for="server-address">Server address</label>
          <input type="text" id="server-address" placeholder="axim-server.tailnet-name.ts.net:8090" autocomplete="off" />
          <small class="hint">The AXIM Server's Tailscale hostname (or IP) and port - see docs/AXIM_REMOTE_ACCESS.md.</small>
        </div>

        <div id="config-error" class="error" style="display:none;"></div>

        <button type="submit" class="primary">Save and Continue</button>
      </form>
    </main>
  </body>
</html>
