<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logs - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/web/theme.css">
<style>
  .log-row { display: flex; gap: 10px; padding: 7px 4px; border-bottom: 1px solid var(--border); font-size: 12.5px; font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
  .log-row:hover { background: var(--surface); }
  .log-time { color: var(--text-faint); white-space: nowrap; flex-shrink: 0; width: 150px; }
  .log-module { color: var(--blue); white-space: nowrap; flex-shrink: 0; width: 140px; overflow: hidden; text-overflow: ellipsis; }
  .log-message { white-space: pre-wrap; word-break: break-word; flex: 1; min-width: 0; }
  .log-level { flex-shrink: 0; width: 60px; }

  @media (max-width: 900px) {
    /* time+module+level alone exceed a phone viewport before the
       message even gets a chance to render - wrap the row so the
       message drops to its own full-width line instead of squeezing
       into whatever pixels are left. */
    .log-row { flex-wrap: wrap; }
    .log-message { flex-basis: 100%; }
  }
</style>
</head>
<body>

<div id="app-shell">
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Logs</h1>
        <div class="subtitle">Owner/Admin only - real entries from AXIM's own log files and the admin action log.</div>
      </div>
    </div>

    <div class="card solid full-width" style="margin-bottom:16px;">
      <div class="row">
        <input type="text" id="f-search" placeholder="Search message text (covers channel/session/asset names too)..." style="width:320px;">
        <select id="f-level" style="width:auto;">
          <option value="">All levels</option>
          <option value="INFO">INFO</option>
          <option value="WARNING">WARNING</option>
          <option value="ERROR">ERROR</option>
        </select>
        <select id="f-module" style="width:auto;">
          <option value="">All modules</option>
          <option value="lifecycle">lifecycle (signals/trades/recovery)</option>
          <option value="ui">ui (admin/API actions)</option>
          <option value="admin_actions">admin_actions</option>
          <option value="dashboard">dashboard</option>
          <option value="pocket_dom">pocket_dom (broker)</option>
        </select>
        <input type="date" id="f-since" style="width:auto;">
        <button class="primary" onclick="refreshLogs()">Apply Filters</button>
        <span id="log-count" class="muted"></span>
      </div>
    </div>

    <div class="card solid full-width" id="logs-container">
      <div class="empty">Loading...</div>
    </div>
  </main>
</div>

<script src="/web/shell.js"></script>
<script>
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
function levelClass(level) {
  if (level === "ERROR") return "neg";
  if (level === "WARNING") return "";
  return "muted";
}

async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return res.json();
}

async function refreshLogs() {
  const container = document.getElementById("logs-container");
  const params = new URLSearchParams({ limit: 300 });
  const search = document.getElementById("f-search").value;
  const level = document.getElementById("f-level").value;
  const module = document.getElementById("f-module").value;
  const since = document.getElementById("f-since").value;
  if (search) params.set("search", search);
  if (level) params.set("level", level);
  if (module) params.set("module", module);
  if (since) params.set("since", since + "T00:00:00");

  container.innerHTML = '<div class="empty">Loading...</div>';
  try {
    const entries = await fetchJSON(`/api/logs?${params.toString()}`);
    document.getElementById("log-count").textContent = `${entries.length} entries`;
    if (!entries.length) {
      container.innerHTML = '<div class="empty">No log entries match these filters.</div>';
      return;
    }
    container.innerHTML = entries.map(e => `
      <div class="log-row">
        <span class="log-time">${escapeHtml((e.timestamp || "").replace("T", " ").slice(0, 19))}</span>
        <span class="log-level ${levelClass(e.level)}">${escapeHtml(e.level)}</span>
        <span class="log-module">${escapeHtml(e.module)}</span>
        <span class="log-message">${escapeHtml(e.message)}</span>
      </div>
    `).join("");
  } catch (e) {
    container.innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

(async () => {
  const user = await AximShell.init({ active: "logs" });
  if (!user) return;
  if (user.role !== "owner" && user.role !== "admin") {
    document.querySelector(".main").innerHTML = '<div class="banner danger">Owner/Admin access required.</div>';
    return;
  }
  refreshLogs();
  // "Live tail" here means auto-refresh on real activity rather than a
  // byte-offset cursor into the log files themselves - core/log_reader.py
  // already does a cheap bounded tail (last 2000 lines, files rotate at
  // a fixed size) on every call, so re-running the existing query is not
  // a new cost model, just removing the "you have to click Refresh"
  // requirement. A real incremental cursor would only earn its
  // complexity if this page's full-reparse cost ever actually became a
  // problem, which it hasn't.
  AximShell.subscribeEvents({
    "trade.closed": { onEvent: refreshLogs },
    "trade.error": { onEvent: refreshLogs },
    "signal.ignored": { onEvent: refreshLogs },
  });
})();
</script>
</body>
</html>
