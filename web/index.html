<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>AXIM Control</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #12161f;
    --panel-border: #232936;
    --text: #e6e9ef;
    --text-dim: #8b93a3;
    --green: #3ddc84;
    --red: #ff5c5c;
    --yellow: #f5c542;
    --blue: #5b9dff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }
  h1 { font-size: 20px; margin: 0; font-weight: 600; letter-spacing: 0.02em; }
  #status-line { color: var(--text-dim); font-size: 13px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 20px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 16px 18px;
    overflow-x: auto;
  }
  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 0 0 12px 0;
  }
  .badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.on { background: rgba(61,220,132,0.15); color: var(--green); }
  .badge.off { background: rgba(139,147,163,0.15); color: var(--text-dim); }
  .badge.warn { background: rgba(245,197,66,0.15); color: var(--yellow); }
  .badge.danger { background: rgba(255,92,92,0.15); color: var(--red); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button {
    background: var(--panel-border);
    color: var(--text);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--blue); }
  button.primary { background: var(--blue); border-color: var(--blue); color: #04101f; font-weight: 600; }
  button.danger { background: var(--red); border-color: var(--red); color: #2a0505; font-weight: 600; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  input[type=text] {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    color: var(--text);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 13px;
    width: 260px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--panel-border); white-space: nowrap; }
  th { color: var(--text-dim); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
  td.title-cell { white-space: normal; max-width: 320px; }
  .toggle { position: relative; display: inline-block; width: 38px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--panel-border); border-radius: 20px; transition: 0.15s;
  }
  .slider:before {
    content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px;
    background: var(--text-dim); border-radius: 50%; transition: 0.15s;
  }
  .toggle input:checked + .slider { background: rgba(61,220,132,0.3); }
  .toggle input:checked + .slider:before { transform: translateX(18px); background: var(--green); }
  .muted { color: var(--text-dim); }
  #emergency-banner {
    display: none;
    background: rgba(255,92,92,0.15);
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>

<div id="emergency-banner">EMERGENCY STOP IS ACTIVE - no signals are being executed. Clear it below when ready.</div>

<header>
  <h1>AXIM Control</h1>
  <div id="status-line">loading...</div>
</header>

<div class="grid">
  <div class="panel">
    <h2>Process</h2>
    <div class="row" style="margin-bottom:10px;">
      Listener: <span id="process-badge" class="badge off">unknown</span>
    </div>
    <div class="row">
      <button class="primary" onclick="callControl('/api/process/start')">Start</button>
      <button onclick="callControl('/api/process/stop')">Stop</button>
    </div>
  </div>

  <div class="panel">
    <h2>Trading</h2>
    <div class="row" style="margin-bottom:10px;">
      State: <span id="trading-badge" class="badge off">unknown</span>
    </div>
    <div class="row">
      <button onclick="callControl('/api/control/pause')">Pause</button>
      <button onclick="callControl('/api/control/resume')">Resume</button>
      <button class="danger" onclick="confirmEmergencyStop()">Emergency Stop</button>
      <button id="clear-estop-btn" style="display:none" onclick="callControl('/api/control/clear-emergency-stop')">Clear Emergency Stop</button>
    </div>
  </div>

  <div class="panel">
    <h2>Summary</h2>
    <div class="muted" id="summary-line">loading...</div>
  </div>
</div>

<div class="panel">
  <h2>Telegram Channel Manager</h2>
  <div class="row" style="margin-bottom:14px;">
    <input type="text" id="filter-input" placeholder="Search channels by name/username..." oninput="renderChannels()">
    <button onclick="syncChannels()">Sync from Telegram</button>
    <span id="sync-status" class="muted"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Enabled</th>
        <th>Title</th>
        <th>Username</th>
        <th>Kind</th>
        <th>Last signal detected</th>
      </tr>
    </thead>
    <tbody id="channels-body"></tbody>
  </table>
</div>

<script>
let allChannels = [];

async function fetchJSON(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${url} -> ${res.status}: ${body}`);
  }
  return res.json();
}

function fmtTime(iso) {
  if (!iso) return "never";
  const d = new Date(iso);
  return d.toLocaleString();
}

async function refreshStatus() {
  try {
    const status = await fetchJSON("/api/status");
    document.getElementById("status-line").textContent =
      `updated ${new Date().toLocaleTimeString()} - ${status.enabled_channel_count} channel(s) enabled`;

    const processBadge = document.getElementById("process-badge");
    if (status.process.running) {
      processBadge.textContent = `running (pid ${status.process.pids.join(", ")})`;
      processBadge.className = "badge on";
    } else {
      processBadge.textContent = "stopped";
      processBadge.className = "badge off";
    }

    const tradingBadge = document.getElementById("trading-badge");
    const banner = document.getElementById("emergency-banner");
    const clearBtn = document.getElementById("clear-estop-btn");
    if (status.control.emergency_stop) {
      tradingBadge.textContent = "EMERGENCY STOP";
      tradingBadge.className = "badge danger";
      banner.style.display = "block";
      clearBtn.style.display = "inline-block";
    } else if (status.control.paused) {
      tradingBadge.textContent = "paused";
      tradingBadge.className = "badge warn";
      banner.style.display = "none";
      clearBtn.style.display = "none";
    } else {
      tradingBadge.textContent = "active";
      tradingBadge.className = "badge on";
      banner.style.display = "none";
      clearBtn.style.display = "none";
    }

    document.getElementById("summary-line").innerHTML =
      `.env WATCH_CHANNELS: <code>${status.watch_channels_env.join(", ") || "(empty)"}</code><br>` +
      `UI-enabled channels: ${status.enabled_channel_count}`;
  } catch (e) {
    document.getElementById("status-line").textContent = "status unavailable: " + e.message;
  }
}

async function callControl(path) {
  try {
    await fetchJSON(path, { method: "POST" });
  } catch (e) {
    alert("Action failed: " + e.message);
  }
  refreshStatus();
}

function confirmEmergencyStop() {
  if (confirm("Emergency stop: no new signals will be executed until you clear it. Continue?")) {
    callControl("/api/control/emergency-stop");
  }
}

async function refreshChannels() {
  try {
    allChannels = await fetchJSON("/api/channels");
    renderChannels();
  } catch (e) {
    document.getElementById("channels-body").innerHTML =
      `<tr><td colspan="5" class="muted">Failed to load channels: ${e.message}</td></tr>`;
  }
}

function renderChannels() {
  const filter = document.getElementById("filter-input").value.toLowerCase();
  const tbody = document.getElementById("channels-body");
  const filtered = allChannels.filter(c =>
    !filter ||
    (c.title || "").toLowerCase().includes(filter) ||
    (c.username || "").toLowerCase().includes(filter)
  );
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="muted">No channels match.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(c => `
    <tr>
      <td>
        <label class="toggle">
          <input type="checkbox" ${c.enabled ? "checked" : ""} onchange="toggleChannel(${c.id}, this.checked)">
          <span class="slider"></span>
        </label>
      </td>
      <td class="title-cell">${escapeHtml(c.title || "(no title)")}</td>
      <td class="muted">${c.username ? "@" + escapeHtml(c.username) : ""}</td>
      <td class="muted">${c.kind || ""}</td>
      <td class="muted">${fmtTime(c.last_signal_at)}</td>
    </tr>
  `).join("");
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

async function toggleChannel(id, enabled) {
  try {
    await fetchJSON(`/api/channels/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ enabled }),
    });
    const ch = allChannels.find(c => c.id === id);
    if (ch) ch.enabled = enabled;
    refreshStatus();
  } catch (e) {
    alert("Failed to update channel: " + e.message);
    refreshChannels();
  }
}

async function syncChannels() {
  const statusEl = document.getElementById("sync-status");
  statusEl.textContent = "syncing...";
  try {
    const result = await fetchJSON("/api/channels/sync", { method: "POST" });
    statusEl.textContent = `synced ${result.synced} dialog(s)`;
    await refreshChannels();
  } catch (e) {
    statusEl.textContent = "sync failed: " + e.message;
  }
}

refreshStatus();
refreshChannels();
setInterval(refreshStatus, 5000);
</script>
</body>
</html>
