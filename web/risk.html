<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Money Management Studio - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/web/theme.css">
<style>
  .ms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }
  .ms-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; display: flex; flex-direction: column;
    transition: border-color 0.15s var(--ease), transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
  }
  .ms-card:hover { border-color: var(--blue); transform: translateY(-2px); box-shadow: var(--shadow); }
  .ms-card .name { font-weight: 650; font-size: 16px; margin-bottom: 2px; }
  .ms-card .tagline { color: var(--text-dim); font-size: 12.5px; margin-bottom: 10px; }
  .personality-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 750; padding: 3px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: .03em; margin-bottom: 10px; align-self: flex-start; }
  .personality-conservative { background: var(--green-soft); color: var(--green); }
  .personality-balanced { background: var(--yellow-soft); color: var(--yellow); }
  .personality-aggressive { background: var(--red-soft); color: var(--red); }
  .ms-hero { padding: 10px 0; margin: 8px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .ms-hero-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); font-weight: 700; }
  .ms-hero-value { font-size: 22px; font-weight: 750; margin-top: 2px; }
  .ms-rule-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12.5px; }
  .ms-rule-row .l { color: var(--text-faint); font-weight: 650; text-transform: uppercase; font-size: 10.5px; }
  .ms-rule-row .v.on { color: var(--blue); font-weight: 650; }
  .ms-rule-row .v.off { color: var(--text-faint); }
  .ms-custom-tile { border-style: dashed; align-items: center; justify-content: center; text-align: center; }
  .ms-custom-tile .plus { font-size: 30px; color: var(--blue); margin-bottom: 8px; }
  .profile-list-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
    transition: background 0.12s var(--ease);
  }
  .profile-list-item:hover { background: var(--surface); }
  .breadcrumb { font-size: 12.5px; color: var(--text-dim); margin-bottom: 14px; }
  .breadcrumb a { color: var(--blue); cursor: pointer; text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }
  .mm-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
  .mm-tile { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; }
  .mm-tile-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-faint); font-weight: 750; margin-bottom: 4px; }
  .mm-tile-value { font-size: 13.5px; line-height: 1.4; }
  .mm-tile.on { background: var(--blue-soft); }
  .mm-tile.on .mm-tile-label { color: var(--blue); }
  .checkpoint-row { display: flex; gap: 12px; padding: 12px 0; border-top: 1px solid var(--border); }
  .checkpoint-row:first-child { border-top: none; }
  .checkpoint-num { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; background: var(--blue); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; }
  .cp-trigger { font-weight: 650; font-size: 13px; margin-bottom: 2px; }
  .cp-action { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .cycle-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12.5px; }
  .cycle-table th, .cycle-table td { text-align: center; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .cycle-table th { color: var(--text-faint); font-weight: 700; font-size: 10.5px; text-transform: uppercase; }
  .pro-con-list { list-style: none; margin: 0; padding: 0; font-size: 12.5px; line-height: 1.6; }
  .pro-con-list li { padding: 6px 0 6px 22px; position: relative; }
  .pro-con-list.pros li::before { content: "✓"; position: absolute; left: 0; color: var(--green); font-weight: 800; }
  .pro-con-list.cons li::before { content: "✕"; position: absolute; left: 0; color: var(--red); font-weight: 800; }
  .plain-list { list-style: none; margin: 0; padding: 0; font-size: 12.5px; }
  .plain-list li { padding: 7px 0; border-top: 1px solid var(--border); }
  .plain-list li:first-child { border-top: none; }
  .faq-item { border-top: 1px solid var(--border); padding: 12px 0; }
  .faq-item:first-child { border-top: none; }
  .faq-item summary { font-weight: 650; font-size: 13.5px; cursor: pointer; }
  .faq-a { font-size: 13px; color: var(--text-dim); margin: 8px 0 0 16px; line-height: 1.55; }
  .scenario-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .scenario-box { border-radius: 10px; padding: 14px; }
  .scenario-box.win { background: var(--green-soft); }
  .scenario-box.loss { background: var(--red-soft); }
  .sc-title { font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: .04em; }
  .scenario-box.win .sc-title { color: var(--green); }
  .scenario-box.loss .sc-title { color: var(--red); }
  .sc-amount { font-size: 22px; font-weight: 750; font-family: monospace; margin: 4px 0; }
  .warning-box { background: var(--red-soft); border: 1.5px solid var(--red); border-radius: 10px; padding: 12px 14px; font-size: 12.5px; color: var(--red); font-weight: 600; line-height: 1.5; margin-top: 10px; }
  .info-box { background: var(--surface); border-radius: 10px; padding: 12px 14px; font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }
  .sizing-sub { display: none; }
  .sizing-sub.visible { display: block; }
</style>
</head>
<body>

<div id="app-shell">
  <main class="main">
    <div id="view-list">
      <div class="page-header">
        <div>
          <h1>Money Management Studio <a href="/guide#sec-risk-engine" class="help-link" title="Help: Money Management Studio">?</a></h1>
          <div class="subtitle">4 official strategies plus a Custom Strategy Builder. Every card shows the real rules - nothing is created until you say so.</div>
        </div>
      </div>
      <div class="ms-grid" id="strategy-grid" style="margin-bottom:28px;"></div>

      <div class="page-header" style="margin-top:8px;">
        <div><h2 style="margin:0;">My Profiles</h2><div class="subtitle" style="margin-bottom:0;">Profiles you've created from a strategy or built from scratch.</div></div>
      </div>
      <div class="card solid" id="profiles-card">
        <div id="profiles-list" class="muted">Loading...</div>
      </div>
    </div>

    <div id="view-detail" style="display:none;"></div>
    <div id="view-builder" style="display:none;"></div>
  </main>
</div>
<script src="/web/shell.js"></script>
<script>
let allProfiles = [];
let currentStrategy = null;

async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return res.json();
}
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

// A profile auto-created from a provider recommendation carries over the
// raw Telegram channel title (emoji included) plus a "- Suggested
// (Recommended)" suffix - display-only cleanup, matching web/dashboard.html's
// displayFundName; the stored profile name itself is untouched.
function displayProfileName(name) {
  const stripped = (name || "")
    .replace(/\s*-\s*Suggested\s*\(Recommended\)\s*$/i, "")
    .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}\u{2190}-\u{21FF}️]/gu, "")
    .replace(/\s{2,}/g, " ")
    .trim();
  return stripped || (name || "").trim();
}
function fmtMoney(n) { return "$" + Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }
function riskBadgeClass(level) { return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high"; }
function personalityClass(p) { return p === "Conservative" ? "personality-conservative" : p === "Aggressive" ? "personality-aggressive" : "personality-balanced"; }

function showView(id) {
  ["view-list", "view-detail", "view-builder"].forEach(v => {
    document.getElementById(v).style.display = v === id ? "block" : "none";
  });
  window.scrollTo(0, 0);
}

function ruleRow(label, active, onText) {
  return `<div class="ms-rule-row"><span class="l">${label}</span><span class="v ${active ? "on" : "off"}">${active ? onText : "Off"}</span></div>`;
}

function renderStrategyGrid(strategies) {
  document.getElementById("strategy-grid").innerHTML = strategies.map(s => `
    <div class="ms-card" onclick="showStrategyDetail('${s.key}')">
      <div class="row" style="justify-content:space-between; align-items:flex-start;">
        <div class="name">${s.icon} ${s.name}</div>
      </div>
      <div class="tagline">${escapeHtml(s.tagline)}</div>
      <span class="personality-badge ${personalityClass(s.personality)}">${s.personality}</span>
      <div class="ms-hero"><div class="ms-hero-label">Risk per trade</div><div class="ms-hero-value">${s.risk.headline}</div></div>
      ${ruleRow("Martingale", s.martingale.active, "Yes - limited")}
      ${ruleRow("Compounding", s.compounding.active, "Yes")}
      ${ruleRow("Vault", s.vault.active, `Yes - ${s.vault.percent}%`)}
      ${ruleRow("Recalculates at", s.growth_recalc.active, `+${s.growth_recalc.threshold_percent}% growth`)}
    </div>
  `).join("") + `
    <div class="ms-card ms-custom-tile" onclick="showBuilder(null)">
      <div class="plus">+</div>
      <div class="name">Custom Strategy Builder</div>
      <div class="tagline">Build your own bankroll rules from scratch.</div>
    </div>
  `;
}

async function loadStrategies() {
  const data = await fetchJSON("/api/money-strategies");
  renderStrategyGrid(data.strategies);
}

async function loadProfiles() {
  const listEl = document.getElementById("profiles-list");
  try {
    allProfiles = await fetchJSON("/api/risk-profiles?include_templates=false");
  } catch (e) {
    listEl.innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
    return;
  }
  if (!allProfiles.length) {
    listEl.innerHTML = '<div class="empty">No profiles yet - use one of the 4 strategies above, or build your own.</div>';
    return;
  }
  listEl.innerHTML = allProfiles.map(p => `
    <div class="profile-list-item" onclick="showBuilder(null, ${p.id})">
      <span title="${escapeHtml(p.name)}">${escapeHtml(displayProfileName(p.name))}${p.strategy_key ? ` <span class="muted" style="font-size:11.5px;">(based on ${escapeHtml(p.strategy_key.replace(/_/g, " "))})</span>` : ""}</span>
      <span class="badge off">${p.sizing_mode}</span>
    </div>
  `).join("");
}

// ---------------- Strategy detail ----------------

function renderRulesGrid(s) {
  return `
    <div class="mm-grid">
      <div class="mm-tile on"><div class="mm-tile-label">Risk per trade</div><div class="mm-tile-value">${s.risk.headline}</div></div>
      <div class="mm-tile ${s.martingale.active ? "on" : ""}"><div class="mm-tile-label">Martingale</div><div class="mm-tile-value">${s.martingale.active ? "Yes - limited" : "No"}</div></div>
      <div class="mm-tile ${s.compounding.active ? "on" : ""}"><div class="mm-tile-label">Compounding</div><div class="mm-tile-value">${s.compounding.active ? "Yes" : "No"}</div></div>
      <div class="mm-tile ${s.vault.active ? "on" : ""}"><div class="mm-tile-label">Vault</div><div class="mm-tile-value">${s.vault.active ? s.vault.percent + "% of profit" : "No"}</div></div>
      <div class="mm-tile ${s.growth_recalc.active ? "on" : ""}" style="grid-column:span 2;"><div class="mm-tile-label">Position size recalculates</div><div class="mm-tile-value">${s.growth_recalc.active ? `Only after +${s.growth_recalc.threshold_percent}% growth above the previous baseline` : "Never - fixed forever"}</div></div>
    </div>
  `;
}

function renderWorkedExample(s) {
  const w = s.worked_example;
  let cycleHtml = "";
  if (w.cycle) {
    cycleHtml = `<table class="cycle-table"><tr><th>Trade</th>${w.cycle.map(c => `<th>${c.trade}</th>`).join("")}</tr><tr><td>Risk %</td>${w.cycle.map(c => `<td>${c.risk_percent}%</td>`).join("")}</tr><tr><td>Stake</td>${w.cycle.map(c => `<td>$${c.stake.toFixed(2)}</td>`).join("")}</tr></table>`;
  }
  if (w.ladder) {
    cycleHtml = `<table class="cycle-table"><tr><th>Step</th>${w.ladder.map(l => `<th>${l.step}${l.is_max ? " (max)" : ""}</th>`).join("")}</tr><tr><td>Stake</td>${w.ladder.map(l => `<td>$${l.stake.toFixed(2)}</td>`).join("")}</tr></table><p class="muted" style="font-size:12px; margin:8px 0 0;">A win at any step resets you to Step 0. A loss at the max step ends the session rather than increasing further.</p>`;
  }
  return `
    <p style="font-size:12.5px; color:var(--text-dim); margin:0 0 10px;">A mechanical illustration of the rule above, not a performance projection - at a $${w.starting_bankroll.toLocaleString()} bankroll, stake size $${w.stake.toFixed(2)}, assuming an 88% payout:</p>
    ${cycleHtml}
    <div class="scenario-pair" style="margin-top:${cycleHtml ? "12px" : "0"};">
      <div class="scenario-box win"><div class="sc-title">If it wins</div><div class="sc-amount">+$${w.win.profit.toFixed(2)}</div><div style="font-size:12px; color:var(--text-dim);">Balance: $${w.starting_bankroll.toLocaleString()} &rarr; $${w.win.active_after.toLocaleString()}</div>${w.win.vault_amount !== undefined ? `<div style="font-size:11.5px; color:var(--green); margin-top:6px; font-weight:650;">$${w.win.vault_amount.toFixed(2)} moves to Vault immediately</div>` : ""}</div>
      <div class="scenario-box loss"><div class="sc-title">If it loses</div><div class="sc-amount">-$${Math.abs(w.loss.loss).toFixed(2)}</div><div style="font-size:12px; color:var(--text-dim);">Balance: $${w.starting_bankroll.toLocaleString()} &rarr; $${w.loss.active_after.toLocaleString()}</div>${w.loss.next_step_stake !== undefined ? `<div style="font-size:11.5px; color:var(--yellow); margin-top:6px; font-weight:650;">Next stake rises to $${w.loss.next_step_stake.toFixed(2)}</div>` : ""}</div>
    </div>
  `;
}

function renderTimeline(s) {
  if (!s.growth_timeline.length) return `<p style="font-size:13px; color:var(--text-dim);">This strategy's stake never changes.</p>`;
  return s.growth_timeline.map(cp => `
    <div class="checkpoint-row"><div class="checkpoint-num">${cp.checkpoint}</div><div><div class="cp-trigger">${cp.trigger}</div><div class="cp-action">${cp.action}</div></div></div>
  `).join("");
}

async function showStrategyDetail(key) {
  showView("view-detail");
  const el = document.getElementById("view-detail");
  el.innerHTML = `<div class="progress-row">Loading...</div>`;
  let s;
  try { s = await fetchJSON(`/api/money-strategies/${key}`); } catch (e) { el.innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`; return; }
  currentStrategy = s;
  el.innerHTML = `
    <div class="breadcrumb"><a onclick="showView('view-list')">Money Management Studio</a> / ${escapeHtml(s.name)}</div>
    <div class="row" style="align-items:flex-start; gap:16px;">
      <div style="flex:2; min-width:0;">
        <div class="card">
          <div class="row" style="gap:10px; margin-bottom:12px;"><span class="badge ${riskBadgeClass(s.risk_level)}">${s.risk_level} risk</span><span class="personality-badge ${personalityClass(s.personality)}">${s.personality}</span></div>
          <h2 style="margin:0 0 8px;">${s.icon} ${s.name}</h2>
          <p style="font-size:13.5px; margin:0;">${s.purpose}</p>
        </div>
        <div class="card"><h3 style="margin-top:0;">The rules, at a glance</h3>${renderRulesGrid(s)}</div>
        <div class="card"><h3 style="margin-top:0;">Worked $1,000 example</h3>${renderWorkedExample(s)}</div>
        <div class="card"><h3 style="margin-top:0;">Growth recalculation timeline</h3>${renderTimeline(s)}
          <div class="warning-box" style="margin-top:12px;">This recalculation isn't enforced by the live trading engine yet - saving this strategy below uses its base risk (${s.risk.headline}) as a fixed value. Building real cross-session growth-threshold recalculation is tracked as a follow-up.</div>
        </div>
        <div class="row" style="gap:16px;">
          <div class="card" style="flex:1;"><h3 style="margin-top:0;">Pros</h3><ul class="pro-con-list pros">${s.pros.map(p => `<li>${p}</li>`).join("")}</ul></div>
          <div class="card" style="flex:1;"><h3 style="margin-top:0;">Cons</h3><ul class="pro-con-list cons">${s.cons.map(c => `<li>${c}</li>`).join("")}</ul></div>
        </div>
        <div class="card"><h3 style="margin-top:0;">Ideal signal provider types</h3><p style="font-size:13px; margin:0;">${s.ideal_providers}</p></div>
        <div class="card"><h3 style="margin-top:0;">Frequently asked questions</h3>${s.faq.map(f => `<details class="faq-item"><summary>${f.q}</summary><div class="faq-a">${f.a}</div></details>`).join("")}</div>
      </div>
      <div style="flex:1; position:sticky; top:20px;">
        <div class="card"><h3 style="margin-top:0;">Best for</h3><ul class="plain-list">${s.best_for.map(b => `<li>${b}</li>`).join("")}</ul></div>
        <div class="card">
          <h3 style="margin-top:0;">Ready to use this?</h3>
          <p style="font-size:12px; color:var(--text-dim); margin:0 0 12px;">This is one of AXIM's 4 official strategies - locked, so it always means exactly what's on this page. Nothing is created until you confirm.</p>
          <button class="primary" style="width:100%; margin-bottom:8px;" onclick="useStrategy('${s.key}')">Use This Strategy</button>
          <button class="subtle" style="width:100%;" onclick="showBuilder('${s.key}')">Create From This Template</button>
        </div>
      </div>
    </div>
  `;
}

async function useStrategy(key) {
  const fundBankroll = prompt(`Starting bankroll for this profile ($):`, "1000");
  if (fundBankroll === null) return;
  const bankroll = parseFloat(fundBankroll) || 1000;
  await createFromStrategy(key, currentStrategy.name, bankroll);
}

async function createFromStrategy(key, name, bankroll) {
  try {
    const created = await fetchJSON(`/api/money-strategies/${key}/create-profile`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, bankroll }),
    });
    alert(`"${created.name}" created. You can select it from any Session's Risk Profile dropdown, or manage it below.`);
    await loadProfiles();
    showView("view-list");
  } catch (e) {
    alert("Failed to create profile: " + e.message);
  }
}

// ---------------- Custom Strategy Builder ----------------

async function showBuilder(baseKey, existingProfileId) {
  showView("view-builder");
  const el = document.getElementById("view-builder");
  el.innerHTML = `<div class="progress-row">Loading...</div>`;

  let base = null, existing = null;
  if (baseKey) { try { base = await fetchJSON(`/api/money-strategies/${baseKey}`); } catch (e) {} }
  if (existingProfileId) { try { existing = await fetchJSON(`/api/risk-profiles/${existingProfileId}`); } catch (e) {} }

  const preset = existing ? {
    name: existing.name, bankroll: existing.bankroll,
    sizing_mode: existing.sizing_mode, percent: existing.percent_of_bankroll, fixed: existing.fixed_amount,
    mart_enabled: existing.martingale.enabled, mart_steps: existing.martingale.max_steps, mart_mult: existing.martingale.multiplier, mart_reset: existing.martingale.reset_after_win,
    vault_enabled: existing.profit_vault.enabled, vault_percent: existing.profit_vault.vault_percent, vault_trigger: existing.profit_vault.trigger_event,
  } : base ? {
    name: `${base.name} (Custom)`, bankroll: 1000,
    sizing_mode: "percent", percent: parseFloat(base.risk.headline) || 1, fixed: 10,
    mart_enabled: base.martingale.active, mart_steps: 3, mart_mult: 2, mart_reset: true,
    vault_enabled: base.vault.active, vault_percent: base.vault.percent || 25, vault_trigger: "per_trade",
  } : {
    name: "My Custom Strategy", bankroll: 1000,
    sizing_mode: "percent", percent: 1, fixed: 10,
    mart_enabled: false, mart_steps: 3, mart_mult: 2, mart_reset: true,
    vault_enabled: false, vault_percent: 25, vault_trigger: "per_trade",
  };

  const baseName = base ? base.name : null;
  const heading = existing ? `Edit "${existing.name}"` : "Custom Strategy Builder";

  el.innerHTML = `
    <div class="breadcrumb"><a onclick="showView('view-list')">Money Management Studio</a> / ${heading}</div>
    <div class="page-header"><div><h1 style="margin-bottom:4px;">${heading}</h1><div class="subtitle">${existing ? "Editing your own saved profile." : "AXIM Trader's signature feature - nothing is saved until you confirm" + (baseName ? `, and "${baseName}" itself is never modified.` : ".")}</div></div></div>
    ${baseName ? `<div class="info-box" style="margin-bottom:16px;">Starting from <b>${baseName}</b>'s rules as a template.</div>` : ""}
    <div class="row" style="align-items:flex-start; gap:16px;">
      <div style="flex:2; min-width:0;">
        <div class="card">
          <div class="field"><label>Profile name</label><input type="text" id="f-name" value="${escapeHtml(preset.name)}"></div>
          <div class="field"><label>Bankroll ($)</label><input type="number" id="f-bankroll" step="1" min="1" value="${preset.bankroll}"></div>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">Position sizing</h3>
          <div class="field"><label>Method</label>
            <select id="f-sizing-mode">
              <option value="fixed" ${preset.sizing_mode === "fixed" ? "selected" : ""}>Fixed dollar sizing</option>
              <option value="percent" ${preset.sizing_mode === "percent" ? "selected" : ""}>Percentage sizing</option>
              <option value="dynamic" ${preset.sizing_mode === "dynamic" ? "selected" : ""}>Dynamic (recalculates every trade)</option>
              <option value="kelly" ${preset.sizing_mode === "kelly" ? "selected" : ""}>Kelly sizing</option>
            </select>
          </div>
          <div id="sizing-fixed" class="sizing-sub"><div class="field"><label>Fixed amount ($)</label><input type="number" id="f-fixed" step="1" min="1" value="${preset.fixed || 10}"></div></div>
          <div id="sizing-percent" class="sizing-sub"><div class="field"><label>Percent of bankroll (%)</label><input type="number" id="f-percent" step="0.1" min="0.1" value="${preset.percent || 1}"></div></div>
          <div id="sizing-dynamic" class="sizing-sub"><div class="field"><label>Percent of current balance (%)</label><input type="number" id="f-dynamic-percent" step="0.1" min="0.1" value="${preset.percent || 1}"></div></div>
          <div id="sizing-kelly" class="sizing-sub">
            <div class="row"><div class="field"><label>Estimated win rate (%)</label><input type="number" id="f-kelly-p" value="55"></div><div class="field"><label>Estimated payout (0-1)</label><input type="number" id="f-kelly-b" step="0.01" value="0.88"></div></div>
            <div class="field"><label>Kelly fraction</label><input type="number" id="f-kelly-fraction" step="0.05" value="0.5"></div>
          </div>
        </div>
        <div class="card">
          <div class="row" style="justify-content:space-between;"><h3 style="margin:0;">Martingale</h3><label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="f-mart-enabled" style="width:auto;" ${preset.mart_enabled ? "checked" : ""}> Enabled</label></div>
          <div id="mart-fields" style="display:${preset.mart_enabled ? "block" : "none"}; margin-top:10px;">
            <div class="row">
              <div class="field"><label>Max steps</label><input type="number" id="f-mart-steps" min="1" max="10" value="${preset.mart_steps || 3}"></div>
              <div class="field"><label>Multiplier</label><input type="number" id="f-mart-mult" step="0.1" min="1" value="${preset.mart_mult || 2}"></div>
            </div>
            <label style="display:flex; align-items:center; gap:8px; font-size:13px;"><input type="checkbox" id="f-mart-reset" style="width:auto;" ${preset.mart_reset !== false ? "checked" : ""}> Reset to base stake after a win</label>
            <div class="warning-box" id="mart-unlimited-warning" style="display:none;">⚠ A long losing streak with no cap can consume an entire bankroll. Keep max steps low unless you fully understand the exposure - use "Preview Projected Exposure" on the profile after saving to see the worst case in dollars.</div>
          </div>
        </div>
        <div class="card">
          <div class="row" style="justify-content:space-between;"><h3 style="margin:0;">Vault</h3><label style="display:flex; align-items:center; gap:8px;"><input type="checkbox" id="f-vault-enabled" style="width:auto;" ${preset.vault_enabled ? "checked" : ""}> Enabled</label></div>
          <div id="vault-fields" style="display:${preset.vault_enabled ? "block" : "none"}; margin-top:10px;">
            <div class="row">
              <div class="field"><label>Vault percent (%)</label><input type="number" id="f-vault-percent" step="1" min="1" max="100" value="${preset.vault_percent || 25}"></div>
              <div class="field"><label>Trigger</label>
                <select id="f-vault-trigger">
                  <option value="per_trade" ${preset.vault_trigger === "per_trade" ? "selected" : ""}>Every winning trade, immediately</option>
                  <option value="every_winning_session" ${preset.vault_trigger === "every_winning_session" ? "selected" : ""}>Every winning session</option>
                  <option value="milestone_based" ${preset.vault_trigger === "milestone_based" ? "selected" : ""}>Bankroll milestone</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">Session controls</h3>
          <div class="row">
            <div class="field"><label>Daily loss limit ($, 0=off)</label><input type="number" id="f-max-daily-loss" value="0"></div>
            <div class="field"><label>Profit target ($, 0=off)</label><input type="number" id="f-profit-target" value="0"></div>
            <div class="field"><label>Max per trade ($, 0=off)</label><input type="number" id="f-max-trade" value="0"></div>
          </div>
          <div class="info-box">Emergency Stop always applies immediately, across every strategy including this one - it can never be disabled here.</div>
        </div>
      </div>
      <div style="flex:1; position:sticky; top:20px;">
        <div class="card">
          <h3 style="margin-top:0;">Save</h3>
          <p style="font-size:12px; color:var(--text-dim); margin:0 0 10px;">${existing ? "Updates this profile - your other profiles are untouched." : `Creates a new profile.${baseName ? ` "${baseName}" itself is never modified.` : ""}`}</p>
          <button class="primary" style="width:100%;" onclick="saveBuilder(${existingProfileId || "null"})">${existing ? "Save Changes" : "Save as New Profile"}</button>
          <span id="builder-save-status" class="muted" style="display:block; margin-top:8px;"></span>
        </div>
      </div>
    </div>
  `;

  document.getElementById("f-sizing-mode").addEventListener("change", (e) => showSizingSub(e.target.value));
  showSizingSub(preset.sizing_mode);
  document.getElementById("f-mart-enabled").addEventListener("change", (e) => {
    document.getElementById("mart-fields").style.display = e.target.checked ? "block" : "none";
  });
  document.getElementById("f-vault-enabled").addEventListener("change", (e) => {
    document.getElementById("vault-fields").style.display = e.target.checked ? "block" : "none";
  });
  const martSteps = document.getElementById("f-mart-steps");
  const updateWarning = () => { document.getElementById("mart-unlimited-warning").style.display = (parseInt(martSteps.value, 10) > 5) ? "block" : "none"; };
  martSteps.addEventListener("input", updateWarning);
  updateWarning();
}

function showSizingSub(mode) {
  ["fixed", "percent", "dynamic", "kelly"].forEach(m => {
    document.getElementById(`sizing-${m}`).classList.toggle("visible", m === mode);
  });
}

async function saveBuilder(existingProfileId) {
  const statusEl = document.getElementById("builder-save-status");
  const name = document.getElementById("f-name").value.trim();
  if (!name) { alert("Please give this profile a name."); return; }
  const sizingMode = document.getElementById("f-sizing-mode").value;
  const body = {
    name, bankroll: parseFloat(document.getElementById("f-bankroll").value) || 0,
    sizing_mode: sizingMode,
    fixed_amount: parseFloat((document.getElementById("f-fixed") || {}).value) || 1,
    percent_of_bankroll: parseFloat((document.getElementById(sizingMode === "dynamic" ? "f-dynamic-percent" : "f-percent") || {}).value) || 1,
    kelly_win_rate_estimate: document.getElementById("f-kelly-p") ? (parseFloat(document.getElementById("f-kelly-p").value) || 0) / 100 : null,
    kelly_payout_estimate: document.getElementById("f-kelly-b") ? parseFloat(document.getElementById("f-kelly-b").value) || null : null,
    kelly_fraction_multiplier: document.getElementById("f-kelly-fraction") ? parseFloat(document.getElementById("f-kelly-fraction").value) || 0.5 : 0.5,
    max_daily_loss: parseFloat(document.getElementById("f-max-daily-loss").value) || 0,
    profit_target: parseFloat(document.getElementById("f-profit-target").value) || 0,
    max_trade_amount: parseFloat(document.getElementById("f-max-trade").value) || 0,
  };
  statusEl.textContent = "Saving...";
  try {
    let profileId = existingProfileId;
    if (profileId) {
      await fetchJSON(`/api/risk-profiles/${profileId}`, { method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
    } else {
      const created = await fetchJSON(`/api/risk-profiles`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      profileId = created.id;
    }
    const martEnabled = document.getElementById("f-mart-enabled").checked;
    await fetchJSON(`/api/risk-profiles/${profileId}/martingale`, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        enabled: martEnabled,
        max_steps: parseInt(document.getElementById("f-mart-steps").value, 10) || 1,
        multiplier: parseFloat(document.getElementById("f-mart-mult").value) || 2,
        reset_after_win: document.getElementById("f-mart-reset").checked,
      }),
    });
    const vaultEnabled = document.getElementById("f-vault-enabled").checked;
    await fetchJSON(`/api/risk-profiles/${profileId}/vault`, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        enabled: vaultEnabled,
        vault_percent: parseFloat(document.getElementById("f-vault-percent").value) || 25,
        trigger_event: document.getElementById("f-vault-trigger").value,
      }),
    });
    statusEl.textContent = "Saved.";
    await loadProfiles();
    setTimeout(() => showView("view-list"), 500);
  } catch (e) {
    statusEl.textContent = "Failed: " + e.message;
  }
}

(async () => {
  const user = await AximShell.init({ active: "money" });
  if (!user) return;
  await Promise.all([loadStrategies(), loadProfiles()]);
})();
</script>
</body>
</html>
