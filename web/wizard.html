<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Setup - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/web/favicon.svg">
<link rel="stylesheet" href="/web/theme.css">
<style>
  body { min-height: 100vh; }
  .wizard-shell { max-width: 640px; margin: 40px auto; padding: 0 20px; }
  .wizard-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .wizard-logo .mark { width: 32px; height: 32px; background: var(--blue); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
  .wizard-logo .name { font-weight: 700; font-size: 18px; }
  .step-track { display: flex; gap: 6px; margin-bottom: 24px; }
  .step-dot { flex: 1; height: 4px; border-radius: 999px; background: var(--border); }
  .step-dot.done { background: var(--green); }
  .step-dot.current { background: var(--blue); }
  .wizard-card { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 32px; }
  .wizard-card h2 { margin: 0 0 6px 0; font-size: 19px; }
  .wizard-subtitle { color: var(--text-dim); font-size: 13.5px; margin-bottom: 22px; }
  .channel-item, .template-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .channel-item:last-child, .template-item:last-child { border-bottom: none; }
  .wizard-nav { display: flex; justify-content: space-between; margin-top: 24px; }
</style>
</head>
<body>

<div class="wizard-shell">
  <div class="wizard-logo"><span class="mark"><svg width="100%" height="100%" viewBox="0 0 100 100"><path fill-rule="evenodd" fill="#FFFFFF" d="M 50 12 L 84 46 L 50 80 L 16 46 Z M 66 30 L 82 46 L 66 62 L 50 46 Z"/></svg></span><span class="name">AXIM Trader Setup</span></div>
  <div class="step-track" id="step-track"></div>

  <div class="wizard-card">
    <div id="step-content"></div>
    <div class="wizard-nav" id="wizard-nav">
      <button class="subtle" id="back-btn" onclick="goBack()" style="visibility:hidden;">Back</button>
      <button class="primary" id="next-btn" onclick="goNext()">Continue</button>
    </div>
  </div>
</div>

<script>
const STEP_NAMES = ["Owner Account", "Telegram", "Pocket Option", "Risk Profile", "Channels", "Session", "Demo Test", "Ready"];
let currentStep = 0;
let wizardState = { channelIds: [], riskProfileId: null, brokerAccountId: null };

async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  const isJson = (res.headers.get("content-type") || "").includes("application/json");
  const body = isJson ? await res.json() : null;
  if (!res.ok) {
    const err = new Error((body && body.detail) || `HTTP ${res.status}`);
    err.status = res.status;
    throw err;
  }
  return body;
}
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

function renderTrack() {
  document.getElementById("step-track").innerHTML = STEP_NAMES.map((_, i) =>
    `<div class="step-dot ${i < currentStep ? "done" : i === currentStep ? "current" : ""}"></div>`
  ).join("");
}

const CONNECTION_BADGE = { connected: "on", connecting: "warn", disconnected: "off", error: "danger" };

async function renderBrokerAccountStep() {
  const content = document.getElementById("step-content");
  const accounts = await fetchJSON("/api/broker-accounts");  // failures handled by renderStep's own try/catch, which always calls this
  // Same stale-render guard as renderStepContent's other branches - this
  // function is also called directly from createWizardBrokerAccount/
  // connectWizardBrokerAccount as a same-step refresh, but the user can
  // still navigate away (Continue/Back) while this fetch is in flight.
  if (currentStep !== 2) return;
  if (accounts.length && wizardState.brokerAccountId === null) {
    // A fresh listener/telegram connect earlier in the wizard, or a
    // second run, may already have an account - default to it rather
    // than making the user re-pick one that's sitting right there.
    wizardState.brokerAccountId = accounts[0].id;
  }
  content.innerHTML = `
    <h2>Connect a Pocket Option account</h2>
    <div class="wizard-subtitle">AXIM never asks for your Pocket Option password here - you log in through a real browser window that opens when you click Connect.</div>
    ${accounts.length ? accounts.map(a => `
      <div class="channel-item">
        <input type="radio" name="w-broker-account" value="${a.id}" id="w-acct-${a.id}"
          ${wizardState.brokerAccountId === a.id ? "checked" : ""} onchange="wizardState.brokerAccountId = ${a.id}" style="width:auto;">
        <label for="w-acct-${a.id}" style="flex:1;">${escapeHtml(a.name)} <span class="badge off">${a.mode}</span></label>
        <span class="badge ${CONNECTION_BADGE[a.connection_status] || "off"}">${a.connection_status}</span>
        ${a.connection_status === "connected" ? "" : `<button class="subtle" onclick="connectWizardBrokerAccount(${a.id})" ${a.connection_status === "connecting" ? "disabled" : ""}>${a.connection_status === "connecting" ? "Connecting..." : "Connect"}</button>`}
      </div>
    `).join("") : '<div class="empty">No accounts yet - add one below.</div>'}
    <div class="row" style="margin-top:14px; gap:8px;">
      <input type="text" id="w-new-acct-name" placeholder="Account name, e.g. Pocket Option Demo" style="flex:2;">
      <select id="w-new-acct-mode" style="flex:1;">
        <option value="demo">Demo</option>
        <option value="live">Live</option>
        <option value="both">Both</option>
      </select>
      <button id="w-add-acct-btn" onclick="createWizardBrokerAccount()">Add</button>
    </div>
    <div id="w-broker-error" class="banner danger" style="display:none; margin-top:10px;"></div>
    <div class="muted" style="margin-top:12px; font-size:12px;">You can skip this and connect an account later from the Broker page - but a Fund can't start a session without one attached.</div>
  `;
}

async function createWizardBrokerAccount() {
  const nameEl = document.getElementById("w-new-acct-name");
  const errEl = document.getElementById("w-broker-error");
  errEl.style.display = "none";
  if (!nameEl.value.trim()) { errEl.textContent = "Enter a name for the account."; errEl.style.display = "block"; return; }
  try {
    const account = await fetchJSON("/api/broker-accounts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: nameEl.value.trim(), mode: document.getElementById("w-new-acct-mode").value }),
    });
    wizardState.brokerAccountId = account.id;
    await renderBrokerAccountStep();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function connectWizardBrokerAccount(id) {
  try {
    await fetchJSON(`/api/broker-accounts/${id}/connect`, { method: "POST" });
    await renderBrokerAccountStep();
    let ticks = 0;
    const poll = setInterval(async () => {
      ticks += 1;
      if (currentStep !== 2) { clearInterval(poll); return; }
      try {
        await renderBrokerAccountStep();
        const account = (await fetchJSON("/api/broker-accounts")).find(a => a.id === id);
        if (!account || account.connection_status !== "connecting" || ticks > 60) clearInterval(poll);
      } catch (e) {
        console.error("connectWizardBrokerAccount poll failed:", e);
        if (ticks > 60) clearInterval(poll);
      }
    }, 5000);
  } catch (e) {
    const errEl = document.getElementById("w-broker-error");
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function renderStep() {
  renderTrack();
  document.getElementById("back-btn").style.visibility = currentStep === 0 ? "hidden" : "visible";
  const content = document.getElementById("step-content");
  const nextBtn = document.getElementById("next-btn");
  nextBtn.textContent = "Continue";
  nextBtn.disabled = false;

  try {
    await renderStepContent(content, nextBtn);
  } catch (e) {
    content.innerHTML = `
      <h2>Something went wrong loading this step</h2>
      <div class="banner danger">${escapeHtml(e.message)}</div>
      <button class="subtle" onclick="renderStep()" style="margin-top:10px;">Retry</button>
    `;
    nextBtn.disabled = true;
  }
}

async function renderStepContent(content, nextBtn) {
  // Snapshot which step this call is rendering FOR. Every branch below
  // does an await (an API call) before its own content.innerHTML write -
  // if the user clicks Continue again before that resolves, currentStep
  // moves on and a SECOND renderStepContent call starts. Without this
  // guard, whichever call's fetch resolves LAST wins and overwrites the
  // DOM with its own (possibly now-stale) content, regardless of which
  // step is actually current - confirmed reproducible by clicking through
  // steps faster than each step's own fetch could resolve. Mirrors the
  // same "currentStep !== N -> abandon" guard connectWizardBrokerAccount's
  // poll loop already uses for the identical class of problem.
  const stepAtStart = currentStep;
  if (currentStep === 0) {
    const status = await fetchJSON("/api/auth/bootstrap-status");
    if (currentStep !== stepAtStart) return;
    if (!status.needs_bootstrap) {
      content.innerHTML = `<h2>Owner account</h2><div class="wizard-subtitle">Already created - continuing.</div>`;
      setTimeout(goNext, 400);
      return;
    }
    content.innerHTML = `
      <h2>Create your Owner account</h2>
      <div class="wizard-subtitle">This account will have full, permanent control over AXIM.</div>
      <div class="field"><label>Email</label><input type="email" id="w-email"></div>
      <div class="field"><label>Password</label><input type="password" id="w-password" placeholder="At least 8 characters"></div>
      <div id="w-error" class="banner danger" style="display:none;"></div>
    `;
    nextBtn.textContent = "Create Account";
  }

  else if (currentStep === 1) {
    const status = await fetchJSON("/api/telegram/connection-status");
    if (currentStep !== stepAtStart) return;
    if (status.authorized) {
      content.innerHTML = `
        <h2>Connect Telegram</h2>
        <div class="wizard-subtitle">Already connected.</div>
        <div class="banner info">Connected as ${escapeHtml(status.account_name || "your account")}${status.username ? " (@" + escapeHtml(status.username) + ")" : ""}.</div>
      `;
    } else {
      content.innerHTML = `
        <h2>Connect Telegram</h2>
        <div class="wizard-subtitle">AXIM reads trading signals from your Telegram channels. Connect your account to get started.</div>
        <div class="banner warn">Not connected yet - head to <a href="/telegram" style="color:inherit;">Signal Sources</a> to connect, then come back and continue.</div>
      `;
    }
  }

  else if (currentStep === 2) {
    await renderBrokerAccountStep();
  }

  else if (currentStep === 3) {
    const templates = (await fetchJSON("/api/risk-profiles")).filter(p => p.is_template);
    if (currentStep !== stepAtStart) return;
    content.innerHTML = `
      <h2>Choose a starting Risk Profile</h2>
      <div class="wizard-subtitle">Controls trade sizing, Martingale, Compounding, and Profit Vault. You can change this anytime in Money Management Studio.</div>
      <div style="max-height:260px; overflow-y:auto;">
        ${templates.slice(0, 8).map(t => `
          <div class="channel-item">
            <input type="radio" name="w-template" value="${t.id}" id="tpl-${t.id}" style="width:auto;">
            <label for="tpl-${t.id}"><strong>${escapeHtml(t.name)}</strong> - ${escapeHtml(t.description || "")}</label>
          </div>
        `).join("")}
      </div>
      <div class="muted" style="margin-top:10px; font-size:12px;">Or skip to use the global default sizing (Settings &gt; Trading).</div>
    `;
    nextBtn.textContent = "Continue";
  }

  else if (currentStep === 4) {
    const channels = await fetchJSON("/api/channels");
    if (currentStep !== stepAtStart) return;
    content.innerHTML = `
      <h2>Select signal channels</h2>
      <div class="wizard-subtitle">Choose which Telegram channels AXIM should follow.</div>
      <div style="max-height:280px; overflow-y:auto;">
        ${channels.length ? channels.slice(0, 30).map(c => `
          <div class="channel-item">
            <input type="checkbox" class="w-channel" value="${c.id}" data-was-enabled="${c.enabled ? "1" : "0"}" id="ch-${c.id}" ${c.enabled ? "checked" : ""} style="width:auto;">
            <label for="ch-${c.id}">${escapeHtml(c.title || c.username || c.id)}</label>
          </div>
        `).join("") : '<div class="empty">No channels found yet - sync from Signal Sources first.</div>'}
      </div>
    `;
  }

  else if (currentStep === 5) {
    content.innerHTML = `
      <h2>Create your first Trading Session</h2>
      <div class="wizard-subtitle">Sessions are how AXIM trades - bounded by a profit target, loss limit, or trade count, not "running forever." Every session belongs to a Fund, so your results stay organized as you add more portfolios later.</div>
      <div class="field"><label>Fund name</label><input type="text" id="w-fund-name" value="My First Fund"></div>
      <div class="field"><label>Session name</label><input type="text" id="w-session-name" placeholder="My First Session"></div>
      <div class="row">
        <div class="field"><label>Profit target ($)</label><input type="number" id="w-profit-target" value="0"></div>
        <div class="field"><label>Loss limit ($)</label><input type="number" id="w-loss-limit" value="0"></div>
        <div class="field"><label>Max trades</label><input type="number" id="w-max-trades" value="0"></div>
      </div>
      <div class="muted" style="font-size:12px;">You can skip this and start a session later from Trading Sessions.</div>
      <div id="w-error" class="banner danger" style="display:none; margin-top:10px;"></div>
    `;
  }

  else if (currentStep === 6) {
    const status = await fetchJSON("/api/pocket-option/status");
    if (currentStep !== stepAtStart) return;
    if (status.account_mode !== "DEMO") {
      content.innerHTML = `<h2>Demo test</h2><div class="wizard-subtitle">Skipped - this account is in LIVE mode, so a test trade isn't offered here for safety.</div>`;
    } else {
      content.innerHTML = `
        <h2>Run a demo test trade</h2>
        <div class="wizard-subtitle">Places one real trade on your DEMO account through AXIM's live pipeline, so you can see the whole flow work end to end.</div>
        <button class="primary" onclick="runDemoTest()">Run Test Trade</button>
        <span id="demo-test-status" class="muted"></span>
        <div id="demo-test-result" class="muted" style="margin-top:10px; display:none;"></div>
      `;
    }
  }

  else if (currentStep === 7) {
    content.innerHTML = `
      <h2>AXIM Trader is ready</h2>
      <div class="wizard-subtitle">Setup complete. Head to Mission Control to see everything live.</div>
      ${wizardState.fundCreatedWithoutSession ? `
        <div class="banner warn">"${escapeHtml(wizardState.fundCreatedWithoutSession)}" was created, but couldn't start a session yet - connect a Pocket Option account and attach it from the Funds page, then start a session from Trading Sessions.</div>
      ` : ""}
    `;
    nextBtn.textContent = "Go to Mission Control";
  }
}

async function runDemoTest() {
  const statusEl = document.getElementById("demo-test-status");
  const resultEl = document.getElementById("demo-test-result");
  statusEl.textContent = "requesting...";
  try {
    await fetchJSON("/api/broker/test-trade", { method: "POST" });
    for (let i = 0; i < 20; i++) {
      await new Promise(r => setTimeout(r, 3000));
      const status = await fetchJSON("/api/broker/test-trade");
      if (status.status === "completed" || status.status === "error") {
        statusEl.textContent = status.status;
        resultEl.style.display = "block";
        resultEl.textContent = JSON.stringify(status.result, null, 2);
        return;
      }
    }
    statusEl.textContent = "timed out - check Trade History later.";
  } catch (e) {
    statusEl.textContent = "failed: " + e.message;
  }
}

async function goBack() {
  if (currentStep > 0) { currentStep--; await renderStep(); }
}

async function goNext() {
  const nextBtn = document.getElementById("next-btn");
  try {
    if (currentStep === 0) {
      const status = await fetchJSON("/api/auth/bootstrap-status");
      if (status.needs_bootstrap) {
        const email = document.getElementById("w-email").value;
        const password = document.getElementById("w-password").value;
        nextBtn.disabled = true;
        await fetchJSON("/api/auth/bootstrap-owner", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });
      }
    } else if (currentStep === 3) {
      const picked = document.querySelector("input[name='w-template']:checked");
      if (picked) {
        const created = await fetchJSON(`/api/risk-profiles/${picked.value}/duplicate`, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ new_name: "My First Risk Profile" }),
        });
        wizardState.riskProfileId = created.id;
      }
    } else if (currentStep === 4) {
      const checked = Array.from(document.querySelectorAll(".w-channel:checked")).map(el => parseInt(el.value, 10));
      // Only PATCH channels whose state actually changed, and run them
      // concurrently - looping sequentially through every rendered
      // channel (up to 30) with an awaited round-trip each was slow
      // enough to be a real UX problem, found during live verification.
      const changed = Array.from(document.querySelectorAll(".w-channel")).filter(el => {
        const shouldEnable = checked.includes(parseInt(el.value, 10));
        const wasEnabled = el.dataset.wasEnabled === "1";
        return shouldEnable !== wasEnabled;
      });
      await Promise.all(changed.map(el => fetchJSON(`/api/channels/${el.value}`, {
        method: "PATCH", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ enabled: checked.includes(parseInt(el.value, 10)) }),
      })));
      wizardState.channelIds = checked;
    } else if (currentStep === 5) {
      const name = document.getElementById("w-session-name").value;
      const fundName = document.getElementById("w-fund-name").value || "My First Fund";
      if (name && wizardState.channelIds.length) {
        const fund = await fetchJSON("/api/funds", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: fundName, starting_balance: 0 }),
        });
        if (wizardState.brokerAccountId) {
          await fetchJSON(`/api/funds/${fund.fund.id}/broker-account`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ broker_account_id: wizardState.brokerAccountId, is_primary: true }),
          });
        }
        try {
          await fetchJSON("/api/sessions/start", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name, channel_ids: wizardState.channelIds,
              profit_target: parseFloat(document.getElementById("w-profit-target").value) || 0,
              loss_limit: parseFloat(document.getElementById("w-loss-limit").value) || 0,
              max_trades: parseInt(document.getElementById("w-max-trades").value, 10) || 0,
              risk_profile_id: wizardState.riskProfileId,
              fund_id: fund.fund.id,
            }),
          });
        } catch (e) {
          // No broker account attached/connected yet is expected and
          // non-fatal here - the wizard explicitly says starting a
          // session is optional ("you can skip this"). The Fund itself
          // was created successfully; don't block finishing the wizard
          // over a step the user already had the option to skip.
          if (e.status !== 409) throw e;
          wizardState.fundCreatedWithoutSession = fund.fund.name;
        }
      }
    } else if (currentStep === 7) {
      window.location.href = "/dashboard";
      return;
    }
    nextBtn.disabled = false;
  } catch (e) {
    const errEl = document.getElementById("w-error");
    if (errEl) { errEl.textContent = e.message; errEl.style.display = "block"; }
    else alert("Failed: " + e.message);
    nextBtn.disabled = false;
    return;
  }
  currentStep++;
  await renderStep();
}

renderStep();
</script>
</body>
</html>
