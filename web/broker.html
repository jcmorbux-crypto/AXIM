<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Broker - AXIM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/web/theme.css">
</head>
<body>

<div id="app-shell">
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Broker</h1>
        <div class="subtitle">Your Pocket Option connection.</div>
      </div>
    </div>

    <div id="live-warning" class="banner danger" style="display:none;">
      This account is connected in LIVE mode - real money is at risk. Handle Reconnect/Clear Session with care.
    </div>

    <div class="status-line">
      <span id="conn-dot" class="dot off"></span>
      <div>
        <div class="headline" id="conn-headline">Loading...</div>
        <div class="detail" id="conn-detail">&nbsp;</div>
      </div>
    </div>

    <div class="grid">
      <div class="card solid">
        <h3>Account Mode</h3>
        <div class="stat-value-lg" id="account-mode">-</div>
      </div>
      <div class="card solid">
        <h3>Balance</h3>
        <div class="stat-value-lg" id="balance">-</div>
        <div class="stat-caption">Not tracked yet - coming in a future update.</div>
      </div>
    </div>

    <details class="diagnostics" style="margin-bottom:24px;">
      <summary>Connection diagnostics</summary>
      <div class="diagnostics-body" id="conn-diagnostics"></div>
    </details>

    <div class="card solid full-width" style="margin-bottom:20px;">
      <h3>Controls</h3>
      <div class="row" style="margin-bottom:14px;">
        <button onclick="reconnect()">Reconnect</button>
        <button class="danger" onclick="clearSession()">Clear Session</button>
      </div>
      <div class="row">
        <button class="primary" onclick="runTestTrade()" id="test-trade-btn">Run a Test Trade (Demo Only)</button>
        <span id="test-trade-status" class="muted"></span>
      </div>
      <div id="test-trade-result" class="muted" style="margin-top:10px; display:none; white-space:pre-wrap;"></div>
    </div>
  </main>
</div>

<script src="/web/shell.js"></script>
<script>
async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return res.json();
}

async function refreshStatus() {
  try {
    const s = await fetchJSON("/api/pocket-option/status");
    document.getElementById("account-mode").textContent = s.account_mode;
    document.getElementById("live-warning").style.display = s.account_mode === "LIVE" ? "block" : "none";

    const dot = document.getElementById("conn-dot");
    const headline = document.getElementById("conn-headline");
    const detail = document.getElementById("conn-detail");
    if (!s.process_running) {
      dot.className = "dot off"; headline.textContent = "Not connected";
      detail.textContent = "AXIM isn't running - start it from Mission Control.";
    } else if (s.heartbeat_stale) {
      dot.className = "dot warn"; headline.textContent = "Reconnecting";
      detail.textContent = "AXIM is running but re-establishing its Pocket Option connection.";
    } else {
      dot.className = "dot on"; headline.textContent = "Connected";
      detail.textContent = "Your Pocket Option connection is healthy.";
    }

    document.getElementById("balance").textContent = s.balance !== null ? "$" + s.balance : "-";
    const workerInfo = s.process_running && s.heartbeat ? `${s.heartbeat.worker_count} browser worker(s)` : "not currently running";
    const lastHeartbeat = s.heartbeat ? new Date(s.heartbeat.updated_at).toLocaleTimeString() : "none yet";
    document.getElementById("conn-diagnostics").innerHTML = `
      <div>Worker pool: ${workerInfo}</div>
      <div>Last heartbeat seen: ${lastHeartbeat}</div>
      <div>Connection generation: ${s.heartbeat ? s.heartbeat.generation : "-"}</div>
    `;
  } catch (e) {
    document.getElementById("conn-detail").textContent = "Failed to load: " + e.message;
  }
}

async function reconnect() {
  if (!confirm("Reconnect restarts your Pocket Option connection. Continue?")) return;
  try {
    await fetchJSON("/api/process/stop", { method: "POST" });
    await new Promise(r => setTimeout(r, 2000));
    await fetchJSON("/api/process/start", { method: "POST" });
    refreshStatus();
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function clearSession() {
  const typed = prompt('This deletes your saved Pocket Option login - you\'ll need to log in again on the next start. AXIM must be stopped first. Type "CLEAR SESSION" to confirm:');
  if (typed !== "CLEAR SESSION") return;
  try {
    await fetchJSON("/api/broker/clear-session", { method: "POST" });
    alert("Session cleared.");
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

function summarizeTestTradeResult(result) {
  if (!result) return "No result data returned.";
  if (result.error) return `Failed: ${result.error}`;
  if (result.reason) return `Not placed: ${result.reason}`;
  if (result.result) {
    const outcome = result.result === "win" ? "Won" : (result.result === "loss" ? "Lost" : result.result);
    const pl = result.profit_loss !== undefined && result.profit_loss !== null ? ` (${result.profit_loss > 0 ? "+" : ""}$${Number(result.profit_loss).toFixed(2)})` : "";
    return `${outcome}${pl}`;
  }
  return "Trade recorded - see Trade Center for full details.";
}

async function runTestTrade() {
  if (!confirm("Place a real test trade on the DEMO account (EUR/USD OTC, BUY, 1 Minute)? This is blocked entirely if the account is LIVE.")) return;
  const btn = document.getElementById("test-trade-btn");
  const statusEl = document.getElementById("test-trade-status");
  const resultEl = document.getElementById("test-trade-result");
  btn.disabled = true;
  statusEl.textContent = "requesting...";
  resultEl.style.display = "none";
  try {
    await fetchJSON("/api/broker/test-trade", { method: "POST" });
    statusEl.textContent = "waiting for a result...";
    for (let i = 0; i < 20; i++) {
      await new Promise(r => setTimeout(r, 3000));
      const status = await fetchJSON("/api/broker/test-trade");
      if (status.status === "completed" || status.status === "error") {
        statusEl.textContent = "";
        resultEl.style.display = "block";
        resultEl.textContent = summarizeTestTradeResult(status.result);
        if (AximShell.isDeveloperMode()) {
          resultEl.textContent += "\n\n" + JSON.stringify(status.result, null, 2);
        }
        btn.disabled = false;
        return;
      }
    }
    statusEl.textContent = "timed out waiting for a result - check Trade Center.";
  } catch (e) {
    statusEl.textContent = "failed: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

(async () => {
  const user = await AximShell.init({ active: "pocketoption" });
  if (!user) return;
  refreshStatus();
  setInterval(refreshStatus, 10000);
})();
</script>
</body>
</html>
