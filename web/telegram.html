<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signal Sources - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="/web/theme.css">
<style>
  .type-select { width: auto; padding: 4px 8px; font-size: 12px; }
  .priority-input { width: 56px; padding: 4px 6px; }
  .bot-fields { background: var(--blue-soft); border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 6px; }
  .bot-fields input { margin-bottom: 4px; }
  .message-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .message-item:last-child { border-bottom: none; }
  .message-time { color: var(--text-faint); font-size: 11px; }

  /* ---- My Sources: simple, followed-only list - the everyday view.
     Full configuration (source type, priority, bot command fields) is
     one click away via "Configure", not always-visible columns. ---- */
  .source-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg); margin-bottom: 8px;
  }
  .source-card .info { flex: 1; min-width: 0; }
  .source-card .name { font-weight: 600; font-size: 14px; }
  .source-card .meta { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .source-card .stats { display: flex; gap: 20px; }
  .source-card .stats .stat { text-align: right; }
  .source-card .stats .stat .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-faint); }
  .source-card .stats .stat .value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .source-config { background: var(--surface); border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 10px; display: none; }
  .source-config.open { display: block; }

  /* ---- Add Sources: search-as-you-type over channels not yet
     followed, replacing "dump every Telegram channel in a table". ---- */
  .add-source-results { max-height: 260px; overflow-y: auto; margin-top: 10px; }
  .add-source-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 4px; border-bottom: 1px solid var(--border); font-size: 13.5px;
  }
  .add-source-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<div id="app-shell">
  <main class="main">
    <div class="page-header">
      <div>
        <h1>Signal Sources</h1>
        <div class="subtitle">Connect your Telegram account and choose which channels AXIM follows.</div>
      </div>
    </div>

    <div class="grid">
      <div class="card full-width">
        <h3>Connection</h3>
        <div class="row" style="margin-bottom:10px;">
          Status: <span id="conn-badge" class="badge off">loading...</span>
          <span id="conn-detail" class="muted"></span>
        </div>
        <div class="row">
          <button class="primary" onclick="openConnectModal()">Connect / Reconnect Telegram</button>
          <button onclick="syncChannels()">Refresh Channel List</button>
          <span id="sync-status" class="muted"></span>
          <button class="danger" onclick="confirmDisconnect()">Disconnect</button>
        </div>
      </div>
    </div>

    <div class="page-header" style="margin-bottom:14px;">
      <h2 style="margin:0; font-size:16px;">My Sources</h2>
    </div>
    <div id="my-sources-list" style="margin-bottom:24px;"><div class="empty">Loading...</div></div>

    <div class="card solid full-width">
      <h3>Add a Source</h3>
      <input type="text" id="add-source-search" placeholder="Search all your Telegram chats by name or @username..." oninput="renderAddSourceResults()">
      <div class="add-source-results" id="add-source-results"></div>
    </div>
  </main>
</div>

<!-- Connect modal -->
<div class="modal-backdrop" id="connect-modal">
  <div class="modal">
    <h2 style="margin-top:0;">Connect Telegram</h2>
    <div id="connect-step-1">
      <div class="muted" style="margin-bottom:12px;">Credentials are encrypted at rest and only used server-side.</div>
      <div class="field"><label>API ID</label><input type="text" id="conn-api-id" placeholder="leave blank to reuse saved/.env credentials"></div>
      <div class="field"><label>API Hash</label><input type="text" id="conn-api-hash" placeholder="leave blank to reuse saved/.env credentials"></div>
      <div class="field"><label>Phone number</label><input type="text" id="conn-phone" placeholder="+15551234567"></div>
      <div id="connect-error-1" class="banner danger" style="display:none;"></div>
      <div class="row" style="justify-content:flex-end;">
        <button class="subtle" onclick="closeModal('connect-modal')">Cancel</button>
        <button class="primary" onclick="submitSendCode()">Send Code</button>
      </div>
    </div>
    <div id="connect-step-2" style="display:none;">
      <div class="muted" style="margin-bottom:12px;" id="connect-code-sent-msg"></div>
      <div class="field"><label>Verification code</label><input type="text" id="conn-code"></div>
      <div class="field"><label>2FA password (only if your account has one)</label><input type="password" id="conn-password"></div>
      <div id="connect-error-2" class="banner danger" style="display:none;"></div>
      <div class="row" style="justify-content:flex-end;">
        <button class="subtle" onclick="closeModal('connect-modal')">Cancel</button>
        <button class="primary" onclick="submitVerifyCode()">Verify</button>
      </div>
    </div>
  </div>
</div>

<!-- Recent messages modal -->
<div class="modal-backdrop" id="messages-modal">
  <div class="modal" style="width:520px;">
    <h2 style="margin-top:0;" id="messages-title">Recent messages</h2>
    <div id="messages-list" style="max-height:400px; overflow-y:auto;"></div>
    <div class="row" style="justify-content:flex-end; margin-top:12px;">
      <button class="subtle" onclick="closeModal('messages-modal')">Close</button>
    </div>
  </div>
</div>

<script src="/web/shell.js"></script>
<script>
let allChannels = [];
let currentMessagesChannelId = null;

async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  if (!res.ok) {
    let detail = `HTTP ${res.status}`;
    try { detail = (await res.json()).detail || detail; } catch (e) {}
    throw new Error(detail);
  }
  return res.json();
}

function openModal(id) { document.getElementById(id).style.display = "flex"; }
function closeModal(id) { document.getElementById(id).style.display = "none"; }
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }
function fmtTime(iso) { return iso ? new Date(iso).toLocaleString() : "never"; }

async function refreshConnectionStatus() {
  const badge = document.getElementById("conn-badge");
  const detail = document.getElementById("conn-detail");
  try {
    const status = await fetchJSON("/api/telegram/connection-status");
    if (status.authorized) {
      badge.textContent = "Connected";
      badge.className = "badge on";
      detail.textContent = status.account_name ? `${status.account_name}${status.username ? " (@" + status.username + ")" : ""}` : "";
    } else if (status.session_exists) {
      badge.textContent = "Session exists, not authorized";
      badge.className = "badge warn";
      detail.textContent = status.note || "";
    } else {
      badge.textContent = "Not connected";
      badge.className = "badge off";
      detail.textContent = "";
    }
  } catch (e) {
    badge.textContent = "Unknown";
    badge.className = "badge off";
    detail.textContent = e.message;
  }
}

function openConnectModal() {
  document.getElementById("connect-step-1").style.display = "block";
  document.getElementById("connect-step-2").style.display = "none";
  document.getElementById("connect-error-1").style.display = "none";
  document.getElementById("connect-error-2").style.display = "none";
  openModal("connect-modal");
}

let pendingLoginId = null;

async function submitSendCode() {
  const errEl = document.getElementById("connect-error-1");
  errEl.style.display = "none";
  const body = {};
  const apiId = document.getElementById("conn-api-id").value;
  const apiHash = document.getElementById("conn-api-hash").value;
  const phone = document.getElementById("conn-phone").value;
  if (apiId) body.api_id = parseInt(apiId, 10);
  if (apiHash) body.api_hash = apiHash;
  if (phone) body.phone = phone;
  try {
    const result = await fetchJSON("/api/telegram/connect/send-code", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    pendingLoginId = result.pending_id;
    document.getElementById("connect-code-sent-msg").textContent = result.message;
    document.getElementById("connect-step-1").style.display = "none";
    document.getElementById("connect-step-2").style.display = "block";
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function submitVerifyCode() {
  const errEl = document.getElementById("connect-error-2");
  errEl.style.display = "none";
  try {
    await fetchJSON("/api/telegram/connect/verify-code", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        pending_id: pendingLoginId,
        code: document.getElementById("conn-code").value,
        password: document.getElementById("conn-password").value || null,
      }),
    });
    closeModal("connect-modal");
    refreshConnectionStatus();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = "block";
  }
}

async function confirmDisconnect() {
  if (!confirm("Disconnect Telegram? This logs out the channel-manager session (axim_ui_session) - it does NOT stop the live trading listener's own session, but you'll need to reconnect before syncing channels again. Continue?")) return;
  try {
    await fetchJSON("/api/telegram/disconnect", { method: "POST" });
    refreshConnectionStatus();
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function syncChannels() {
  const statusEl = document.getElementById("sync-status");
  statusEl.textContent = "syncing...";
  try {
    const result = await fetchJSON("/api/channels/sync", { method: "POST" });
    statusEl.textContent = `synced ${result.synced} dialog(s)`;
    await refreshChannels();
  } catch (e) {
    statusEl.textContent = "sync failed: " + e.message;
  }
}

async function refreshChannels() {
  try {
    allChannels = await fetchJSON("/api/channels");
    renderMySources();
    renderAddSourceResults();
  } catch (e) {
    document.getElementById("my-sources-list").innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

function renderMySources() {
  const listEl = document.getElementById("my-sources-list");
  const followed = allChannels.filter(c => c.enabled);
  if (!followed.length) {
    listEl.innerHTML = '<div class="card"><div class="empty">No sources followed yet - search below to add one.</div></div>';
    return;
  }
  listEl.innerHTML = followed.map(c => `
    <div class="source-card card-interactive" onclick="toggleConfig(event, ${c.id})">
      <label class="toggle" onclick="event.stopPropagation()">
        <input type="checkbox" checked onchange="toggleChannel(${c.id}, this.checked)">
        <span class="slider"></span>
      </label>
      <div class="info">
        <div class="name">${escapeHtml(c.title || "(no title)")}</div>
        <div class="meta">${c.username ? "@" + escapeHtml(c.username) + " &middot; " : ""}<span class="badge off">${c.source_type}</span></div>
        <div class="source-config" id="config-${c.id}">
          <div class="row">
            <div class="field"><label>Source type</label>
              <select class="type-select" onclick="event.stopPropagation()" onchange="setSourceType(${c.id}, this.value)">
                <option value="passive" ${c.source_type === "passive" ? "selected" : ""}>Passive</option>
                <option value="bot_command" ${c.source_type === "bot_command" ? "selected" : ""}>Bot Command</option>
                <option value="group" ${c.source_type === "group" ? "selected" : ""}>Group Chat</option>
                <option value="manual_review" ${c.source_type === "manual_review" ? "selected" : ""}>Manual Review</option>
              </select>
            </div>
            <div class="field"><label>Priority</label><input type="number" class="priority-input" onclick="event.stopPropagation()" value="${c.priority || 0}" onchange="setPriority(${c.id}, this.value)"></div>
          </div>
          ${c.source_type === "bot_command" ? botFields(c) : ""}
          <div class="muted" style="font-size:12px; margin-top:8px;">Last signal: ${fmtTime(c.last_signal_at)}</div>
          <button class="subtle" onclick="event.stopPropagation(); openMessages(${c.id})">View recent messages</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Win rate</div><div class="value" id="winrate-${c.id}">-</div></div>
        <div class="stat"><div class="label">P/L</div><div class="value" id="pl-${c.id}">-</div></div>
      </div>
    </div>
  `).join("");

  followed.forEach(c => loadPerformance(c.id));
}

function toggleConfig(event, id) {
  const el = document.getElementById(`config-${id}`);
  if (el) el.classList.toggle("open");
}

function renderAddSourceResults() {
  const query = document.getElementById("add-source-search").value.trim().toLowerCase();
  const resultsEl = document.getElementById("add-source-results");
  const candidates = allChannels.filter(c => !c.enabled);
  const matches = query
    ? candidates.filter(c => (c.title || "").toLowerCase().includes(query) || (c.username || "").toLowerCase().includes(query))
    : candidates.slice(0, 8);
  if (!matches.length) {
    resultsEl.innerHTML = query
      ? '<div class="empty" style="padding:10px 4px;">No matching chats found.</div>'
      : (candidates.length === 0 ? '<div class="empty" style="padding:10px 4px;">You\'re following every synced chat.</div>' : "");
    return;
  }
  resultsEl.innerHTML = matches.map(c => `
    <div class="add-source-row">
      <div>
        <span style="font-weight:550;">${escapeHtml(c.title || "(no title)")}</span>
        <span class="muted">${c.username ? " @" + escapeHtml(c.username) : ""}</span>
      </div>
      <button class="primary" onclick="toggleChannel(${c.id}, true).then(refreshChannels)">+ Add</button>
    </div>
  `).join("");
}

function botFields(c) {
  return `
    <div class="bot-fields">
      <input type="text" placeholder="/signal" value="${escapeHtml(c.trigger_command || "")}"
             onchange="setTriggerCommand(${c.id}, this.value)" style="font-size:11.5px;">
      <label style="display:flex; align-items:center; gap:6px; font-size:11px; margin:0;">
        <input type="checkbox" style="width:auto;" ${c.command_wait_for_result ? "checked" : ""}
               onchange="setWaitForResult(${c.id}, this.checked)"> Wait for result before next request
      </label>
    </div>
  `;
}

async function toggleChannel(id, enabled) {
  try {
    await fetchJSON(`/api/channels/${id}`, {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ enabled }),
    });
    const ch = allChannels.find(c => c.id === id);
    if (ch) ch.enabled = enabled;
  } catch (e) {
    alert("Failed: " + e.message);
    refreshChannels();
  }
}

async function setSourceType(id, sourceType) {
  try {
    await fetchJSON(`/api/channels/${id}/config`, {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ source_type: sourceType }),
    });
    await refreshChannels();
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function setPriority(id, priority) {
  try {
    await fetchJSON(`/api/channels/${id}/config`, {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ priority: parseInt(priority, 10) || 0 }),
    });
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function setTriggerCommand(id, value) {
  try {
    await fetchJSON(`/api/channels/${id}/config`, {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ trigger_command: value }),
    });
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function setWaitForResult(id, checked) {
  try {
    await fetchJSON(`/api/channels/${id}/config`, {
      method: "PATCH", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ command_wait_for_result: checked }),
    });
  } catch (e) {
    alert("Failed: " + e.message);
  }
}

async function loadPerformance(id) {
  const winEl = document.getElementById(`winrate-${id}`);
  const plEl = document.getElementById(`pl-${id}`);
  if (!winEl) return;
  try {
    const perf = await fetchJSON(`/api/channels/${id}/performance`);
    winEl.textContent = perf.win_rate !== null ? (perf.win_rate * 100).toFixed(1) + "%" : "-";
    plEl.textContent = perf.total_closed > 0 ? "$" + perf.profit_loss.toFixed(2) : "-";
    plEl.className = "value " + (perf.profit_loss > 0 ? "pos" : (perf.profit_loss < 0 ? "neg" : "muted"));
  } catch (e) {
    winEl.textContent = "-";
  }
}

async function openMessages(id) {
  currentMessagesChannelId = id;
  const channel = allChannels.find(c => c.id === id);
  document.getElementById("messages-title").textContent = `Recent messages - ${channel ? channel.title : ""}`;
  const listEl = document.getElementById("messages-list");
  listEl.innerHTML = '<div class="empty">Loading...</div>';
  openModal("messages-modal");
  try {
    const messages = await fetchJSON(`/api/channels/${id}/messages?limit=25`);
    if (!messages.length) {
      listEl.innerHTML = '<div class="empty">No messages captured yet.</div>';
      return;
    }
    listEl.innerHTML = messages.map(m => `
      <div class="message-item">
        <div class="message-time">${fmtTime(m.received_at)}</div>
        <div>${escapeHtml(m.message_text || "").slice(0, 300)}</div>
      </div>
    `).join("");
  } catch (e) {
    listEl.innerHTML = `<div class="empty">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

(async () => {
  const user = await AximShell.init({ active: "telegram" });
  if (!user) return;
  refreshConnectionStatus();
  refreshChannels();
  setInterval(refreshConnectionStatus, 15000);
})();
</script>
</body>
</html>
