<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mission Control - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){var t=localStorage.getItem('axim-theme')||'system';if(t!=='system')document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="/web/theme.css">
<style>
  .activity-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .activity-row:last-child { border-bottom: none; }
  .activity-row .what { font-weight: 600; font-size: 13.5px; }
  .activity-row .when { color: var(--text-faint); font-size: 12px; margin-top: 2px; }
  .risk-line { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 550; }
  .checklist-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 13.5px; }
  .checklist-item .check { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .checklist-item .check.done { background: var(--green-soft); color: var(--green); }
  .checklist-item .check.pending { background: var(--surface); color: var(--text-faint); border: 1px solid var(--border); }
  .checklist-item.done .label { color: var(--text-faint); text-decoration: line-through; }
  .checklist-item a { color: var(--blue); text-decoration: none; font-size: 12px; margin-left: auto; }

  /* ---- The Fund Card: everything that matters about "how am I doing
     right now" in one confident surface - status pill, hero number,
     goal progress, broker chip, next action. Replaces the previous
     status-line + hero-panel + broker-row as three separate boxes. ---- */
  .fund-hero {
    background: linear-gradient(165deg, #fbfcff 0%, var(--bg) 60%);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 30px 34px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .fund-hero:before {
    content: "";
    position: absolute; top: 0; right: 0; width: 260px; height: 260px;
    background: radial-gradient(circle at top right, var(--blue-soft) 0%, transparent 70%);
    opacity: 0.7; pointer-events: none;
  }
  .fund-hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 4px; }
  .status-pill { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--text-dim); }
  .fund-hero-name { font-size: 15px; font-weight: 650; color: var(--text-dim); margin-bottom: 2px; }
  .fund-hero-value { font-size: 46px; font-weight: 650; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; line-height: 1.05; }
  .fund-hero-caption { color: var(--text-dim); font-size: 13.5px; margin-top: 6px; }
  .goal-progress { margin-top: 20px; max-width: 420px; }
  .goal-progress-track { height: 7px; border-radius: 999px; background: var(--border); overflow: hidden; }
  .goal-progress-fill { height: 100%; border-radius: 999px; background: var(--blue); transition: width 0.7s var(--ease); }
  .goal-progress-caption { font-size: 12.5px; color: var(--text-dim); margin-top: 7px; }
  .fund-hero-subrow { display: flex; gap: 32px; margin-top: 22px; padding-top: 20px; border-top: 1px solid var(--border); flex-wrap: wrap; align-items: flex-end; }
  .fund-hero-subrow .stat { display: flex; flex-direction: column; gap: 3px; }
  .fund-hero-subrow .stat .label { font-size: 12px; color: var(--text-dim); }
  .fund-hero-subrow .stat .value { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .fund-hero-subrow .spacer { flex: 1; }

  /* ---- Funds Overview: a multi-fund operator's real "mission control"
     need - see every Fund's standing at a glance instead of stepping
     through the selector one at a time. Only rendered when there's more
     than one Fund (see renderFundsOverview) - with exactly one Fund the
     hero panel above already shows everything this would duplicate. ---- */
  .funds-overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 4px; }
  .fund-overview-item {
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px;
    cursor: pointer; text-align: left; background: var(--bg); width: 100%;
    transition: border-color 0.15s var(--ease), box-shadow 0.15s var(--ease);
  }
  .fund-overview-item:hover { border-color: var(--blue); box-shadow: var(--shadow); }
  .fund-overview-item.active { border-color: var(--blue); background: var(--blue-soft); }
  .fund-overview-item .name { font-weight: 600; font-size: 13.5px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 8px; }
  .fund-overview-item .pl { font-size: 17px; font-weight: 650; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="app-shell">
  <main class="main">
    <div id="emergency-banner" class="banner danger" style="display:none;">Emergency stop is active - AXIM will not request or place any trades until you clear it.</div>

    <div class="page-header">
      <div>
        <div class="greeting-eyebrow" id="greeting-eyebrow">&nbsp;</div>
        <div class="greeting-title" id="greeting-title">Mission Control</div>
      </div>
      <div class="row">
        <select id="fund-selector" onchange="onFundChange()" style="width:220px;">
          <option value="">All Funds (combined)</option>
        </select>
        <button class="subtle" onclick="callControl('/api/control/pause')">Pause</button>
        <button class="danger" onclick="confirmEmergencyStop()">Emergency Stop</button>
      </div>
    </div>

    <div class="card solid" id="onboarding-checklist" style="display:none; margin-bottom:24px;">
      <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:2px;">
        <h3 style="margin:0;">Setup Checklist</h3>
        <span class="muted" id="onboarding-progress-text" style="font-size:12px;"></span>
      </div>
      <div id="onboarding-items"></div>
    </div>

    <div class="card solid" id="funds-overview-card" style="margin-bottom:20px; display:none;">
      <h3>Your Funds</h3>
      <div id="funds-overview-list" class="funds-overview-grid"></div>
    </div>

    <div class="fund-hero">
      <div class="fund-hero-top">
        <div>
          <div class="fund-hero-name" id="hero-label-text">Today's Performance</div>
          <div class="fund-hero-value count-up" id="daily-pl">-</div>
          <div class="fund-hero-caption" id="daily-pl-caption">&nbsp;</div>
        </div>
        <div style="text-align:right;">
          <div class="status-pill"><span id="status-dot" class="dot off"></span><span id="status-headline">Loading...</span></div>
          <div class="muted" style="font-size:12px; margin-top:4px; max-width:220px;" id="status-detail">&nbsp;</div>
          <div id="broker-account-chip" style="margin-top:8px;"></div>
        </div>
      </div>

      <div class="goal-progress" id="goal-progress-wrap" style="display:none;">
        <div class="goal-progress-track"><div class="goal-progress-fill" id="goal-progress-fill" style="width:0%;"></div></div>
        <div class="goal-progress-caption" id="goal-progress-caption">&nbsp;</div>
      </div>

      <div class="fund-hero-subrow">
        <div class="stat"><span class="label">Win rate</span><span class="value" id="win-rate">-</span></div>
        <div class="stat"><span class="label">Trades today</span><span class="value" id="trades-today">-</span></div>
        <div class="stat"><span class="label" id="session-pl-label">Active session P/L</span><span class="value" id="session-pl">-</span></div>
        <div class="spacer"></div>
        <button class="primary" id="start-session-cta" onclick="window.location.href='/sessions'">Start Session</button>
      </div>
    </div>

    <div class="row" style="align-items:stretch; gap:16px; margin-bottom:24px;">
      <div class="card solid" style="flex:0 0 280px;">
        <h3>Risk</h3>
        <div class="risk-line" id="risk-line">Loading...</div>
        <details class="diagnostics" id="risk-diagnostics" style="display:none;">
          <summary>Limit details</summary>
          <div class="diagnostics-body" id="risk-details"></div>
        </details>
      </div>
      <div class="card solid" style="flex:1; min-width:320px;">
        <h3>Recent Activity</h3>
        <div id="activity-source" class="stat-caption" style="margin-bottom:10px;">&nbsp;</div>
        <div id="activity-list">
          <div class="empty-panel"><span class="empty-panel-mark"><svg viewBox="0 0 100 100"><path fill-rule="evenodd" fill="#FFFFFF" d="M 54 14 L 84 70 L 63 83 L 51 66 L 39 83 L 18 70 Z M 50 34 L 65 54 L 58 54 L 50 43 L 42 54 L 35 54 Z"/></svg></span>No signals yet.</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/web/theme.js"></script>
<script src="/web/shell.js"></script>
<script>
let currentUser = null;
let allFunds = [];
let selectedFundId = "";

function displayName(email) {
  const local = (email || "").split("@")[0] || "there";
  const first = local.split(/[._-]/)[0];
  return first.charAt(0).toUpperCase() + first.slice(1);
}
function greetingPhrase() {
  const hour = new Date().getHours();
  if (hour < 5) return "Good evening";
  if (hour < 12) return "Good morning";
  if (hour < 17) return "Good afternoon";
  return "Good evening";
}
function renderGreeting(user) {
  document.getElementById("greeting-eyebrow").textContent = `${greetingPhrase()}, ${displayName(user.email)}`;
  document.getElementById("greeting-title").textContent = "Your trading operation";
}

async function fetchJSON(url, opts) {
  const res = await fetch(url, { credentials: "same-origin", ...opts });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`${url} -> ${res.status}: ${body}`);
  }
  return res.json();
}

function fmtMoney(n) {
  if (n === null || n === undefined) return "-";
  const sign = n > 0 ? "+" : "";
  return `${sign}$${Number(n).toFixed(2)}`;
}
function plClass(v) {
  if (v === null || v === undefined) return "neutral";
  return v > 0 ? "pos" : (v < 0 ? "neg" : "neutral");
}
function timeAgo(iso) {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 1) return "just now";
  if (mins < 60) return `${mins} min${mins === 1 ? "" : "s"} ago`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `${hours} hour${hours === 1 ? "" : "s"} ago`;
  return new Date(iso).toLocaleDateString();
}

async function loadOnboardingChecklist() {
  const card = document.getElementById("onboarding-checklist");
  try {
    const [status, po, channels, riskProfiles, sessionHistory] = await Promise.all([
      fetchJSON("/api/status"),
      fetchJSON("/api/pocket-option/status"),
      fetchJSON("/api/channels"),
      fetchJSON("/api/risk-profiles?include_templates=false"),
      fetchJSON("/api/sessions?limit=50"),
    ]);
    const telegramOk = status.process.running && !po.heartbeat_stale;
    const items = [
      { label: "Owner account created", done: true, href: null },
      { label: "Telegram connected", done: telegramOk, href: "/telegram" },
      { label: "Pocket Option connected", done: po.process_running && !po.heartbeat_stale, href: "/broker" },
      { label: "Fund created", done: allFunds.length > 0, href: "/funds" },
      { label: "Signal source selected", done: channels.some(c => c.enabled), href: "/telegram" },
      { label: "Money management profile selected", done: riskProfiles.length > 0, href: "/risk" },
      { label: "Demo session completed", done: sessionHistory.some(s => s.trades_count > 0 || (s.status || "").startsWith("stopped")), href: "/sessions" },
    ];
    const doneCount = items.filter(i => i.done).length;
    document.getElementById("onboarding-progress-text").textContent = `${doneCount} of ${items.length} complete`;
    document.getElementById("onboarding-items").innerHTML = items.map(i => `
      <div class="checklist-item ${i.done ? "done" : ""}">
        <span class="check ${i.done ? "done" : "pending"}">${i.done ? "✓" : ""}</span>
        <span class="label">${escapeHtml(i.label)}</span>
        ${!i.done && i.href ? `<a href="${i.href}">Go &rarr;</a>` : ""}
      </div>
    `).join("");
    card.style.display = doneCount < items.length ? "block" : "none";
  } catch (e) {
    card.style.display = "none";
  }
}

async function loadFundSelector() {
  const selector = document.getElementById("fund-selector");
  try {
    allFunds = await fetchJSON("/api/funds?status=active");
  } catch (e) {
    // Left unpopulated on failure (never fabricated) - the caller (the
    // page-init IIFE) still proceeds to loadOnboardingChecklist/refreshAll
    // rather than the whole page silently stalling on this one request.
    console.error("loadFundSelector failed:", e);
    selector.innerHTML = '<option value="">Failed to load funds</option>';
    return;
  }
  const previous = selector.value;
  selector.innerHTML = '<option value="">All Funds (combined)</option>' +
    allFunds.map(f => `<option value="${f.id}">${escapeHtml(f.name)}</option>`).join("");
  selector.value = previous;
  renderFundsOverview();
}
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = s ?? ""; return d.innerHTML.replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

// Built entirely from allFunds (already fetched for the selector, which
// includes each Fund's balances via fund_manager.list_funds_with_balances)
// rather than a request per Fund - trading_balance - starting_balance is
// the same "current standing" figure refreshForFund's own session-pl stat
// already shows for a single selected Fund.
function renderFundsOverview() {
  const card = document.getElementById("funds-overview-card");
  if (allFunds.length < 2) { card.style.display = "none"; return; }
  card.style.display = "block";
  document.getElementById("funds-overview-list").innerHTML = allFunds.map(f => {
    const pl = (f.balances.trading_balance ?? 0) - (f.balances.starting_balance ?? 0);
    const isActive = String(f.id) === String(selectedFundId);
    return `
      <button type="button" class="fund-overview-item ${isActive ? "active" : ""}" onclick="selectFundFromOverview(${f.id})">
        <div class="name"><span>${escapeHtml(f.name)}</span>${f.broker_account ? `<span class="badge ${f.broker_account.connection_status === "connected" ? "on" : "off"}" style="font-size:10.5px;">${escapeHtml(f.broker_account.connection_status)}</span>` : ""}</div>
        <div class="pl ${plClass(pl)}">${fmtMoney(pl)}</div>
      </button>
    `;
  }).join("");
}

function selectFundFromOverview(fundId) {
  document.getElementById("fund-selector").value = fundId;
  onFundChange();
}

function onFundChange() {
  selectedFundId = document.getElementById("fund-selector").value;
  renderFundsOverview();
  refreshAll();
}

async function refreshAll() {
  try {
    if (selectedFundId) {
      await refreshForFund(selectedFundId);
    } else {
      await refreshGlobal();
    }
  } catch (e) {
    console.error(e);
  }
}

function renderBrokerChip(account) {
  const chip = document.getElementById("broker-account-chip");
  if (!account) {
    chip.innerHTML = `<a href="/funds" class="badge danger" style="text-decoration:none;">Broker not connected</a>`;
    return;
  }
  const badgeClass = { connected: "on", connecting: "warn", disconnected: "off", error: "danger" }[account.connection_status] || "off";
  chip.innerHTML = `<span class="badge off">${escapeHtml(account.name)}</span> <span class="badge ${badgeClass}">${account.connection_status}</span>`;
}

function renderGoalProgress(current, target) {
  const wrap = document.getElementById("goal-progress-wrap");
  if (!target || target <= 0) { wrap.style.display = "none"; return; }
  wrap.style.display = "block";
  const pct = Math.max(0, Math.min(100, (current / target) * 100));
  document.getElementById("goal-progress-fill").style.width = pct.toFixed(0) + "%";
  document.getElementById("goal-progress-caption").textContent =
    current >= target
      ? `Goal reached - ${fmtMoney(current)} of ${fmtMoney(target)}`
      : `${fmtMoney(Math.max(current, 0))} of ${fmtMoney(target)} goal (${pct.toFixed(0)}%)`;
}

function renderStartCta(activeSession) {
  const btn = document.getElementById("start-session-cta");
  if (activeSession) {
    btn.textContent = "View Active Session";
    btn.onclick = () => window.location.href = "/sessions";
  } else {
    btn.textContent = "Start Session";
    btn.onclick = () => window.location.href = "/sessions";
  }
}

async function refreshForFund(fundId) {
  const [status, po, report, channels, activeSession] = await Promise.all([
    fetchJSON("/api/status"),
    fetchJSON("/api/pocket-option/status"),
    fetchJSON(`/api/funds/${fundId}`),
    fetchJSON("/api/channels"),
    fetchJSON(`/api/sessions/active-for-fund/${fundId}`),
  ]);
  renderStatusLine(status, po, channels);
  renderStartCta(activeSession);
  renderBrokerChip(report.broker_account);

  const perf = report.performance;
  const dailyPlEl = document.getElementById("daily-pl");
  document.getElementById("hero-label-text").textContent = `${report.fund.name} - Lifetime Performance`;
  dailyPlEl.textContent = fmtMoney(perf.profit_loss);
  dailyPlEl.className = "fund-hero-value count-up " + plClass(perf.profit_loss);
  document.getElementById("daily-pl-caption").textContent =
    perf.total_closed > 0 ? `${perf.wins} win${perf.wins === 1 ? "" : "s"}, ${perf.losses} loss${perf.losses === 1 ? "" : "es"} all-time` : "No trades closed yet.";
  document.getElementById("win-rate").textContent = perf.win_rate !== null ? (perf.win_rate * 100).toFixed(1) + "%" : "-";
  document.getElementById("trades-today").textContent = perf.total_closed;
  document.getElementById("session-pl-label").textContent = "Trading balance";
  const sessionPlEl = document.getElementById("session-pl");
  sessionPlEl.textContent = fmtMoney(report.balances.trading_balance);
  sessionPlEl.className = "value " + plClass(report.balances.trading_balance - report.fund.starting_balance);

  renderGoalProgress(perf.profit_loss, report.fund.profit_target);

  const riskLine = document.getElementById("risk-line");
  riskLine.innerHTML = report.balances.protected_balance > 0
    ? `<span class="badge gold">Protected: ${fmtMoney(report.balances.protected_balance)}</span>`
    : '<span class="dot on"></span> No funds in the vault yet';
  document.getElementById("risk-details").innerHTML = `
    <div>Total account value: ${fmtMoney(report.balances.total_account_value)}</div>
    <div>Starting balance: ${fmtMoney(report.fund.starting_balance)}</div>
    <div>Profit target: ${report.fund.profit_target > 0 ? fmtMoney(report.fund.profit_target) : "not set"}</div>
    <div>Loss limit: ${report.fund.loss_limit > 0 ? fmtMoney(report.fund.loss_limit) : "not set"}</div>
  `;
  document.getElementById("risk-diagnostics").style.display = "block";

  document.getElementById("activity-source").textContent = `Fund: ${report.fund.name} - ${report.sources.length} source(s) assigned`;
  const activityList = document.getElementById("activity-list");
  activityList.innerHTML = report.recent_sessions.length
    ? report.recent_sessions.slice(0, 5).map(s => `
        <div class="activity-row">
          <div><div class="what">${escapeHtml(s.name || "Session")}</div><div class="when">${(s.started_at || "").replace("T", " ").slice(0, 16)}</div></div>
          <div class="${s.realized_pnl >= 0 ? "pos" : "neg"}" style="font-weight:600; font-size:13.5px;">${fmtMoney(s.realized_pnl)}</div>
        </div>
      `).join("")
    : '<div class="empty-panel"><span class="empty-panel-mark"><svg viewBox="0 0 100 100"><path fill-rule="evenodd" fill="#FFFFFF" d="M 54 14 L 84 70 L 63 83 L 51 66 L 39 83 L 18 70 Z M 50 34 L 65 54 L 58 54 L 50 43 L 42 54 L 35 54 Z"/></svg></span>No sessions yet for this fund.</div>';
}

function renderStatusLine(status, po, channels) {
  const dot = document.getElementById("status-dot");
  const headline = document.getElementById("status-headline");
  const detail = document.getElementById("status-detail");
  const banner = document.getElementById("emergency-banner");
  const telegramOk = status.process.running && !po.heartbeat_stale;
  const enabledChannels = channels.filter(c => c.enabled);

  if (status.control.emergency_stop) {
    dot.className = "dot danger"; headline.textContent = "Emergency stop active";
    detail.textContent = "No trades will be placed until you clear the emergency stop.";
    banner.style.display = "block";
  } else if (status.control.paused) {
    dot.className = "dot warn"; headline.textContent = "Paused";
    detail.textContent = "AXIM is connected but not acting on new signals right now.";
    banner.style.display = "none";
  } else if (!status.process.running) {
    dot.className = "dot off"; headline.textContent = "Not running";
    detail.textContent = "Start the AXIM service to begin monitoring your signal sources.";
    banner.style.display = "none";
  } else if (!telegramOk || po.heartbeat_stale) {
    dot.className = "dot warn"; headline.textContent = "Reconnecting";
    detail.textContent = "AXIM is running but re-establishing its connection - this usually resolves itself within a minute.";
    banner.style.display = "none";
  } else {
    dot.className = "dot on live"; headline.textContent = "Running normally";
    detail.textContent = `Connected and watching ${enabledChannels.length} signal source${enabledChannels.length === 1 ? "" : "s"}.`;
    banner.style.display = "none";
  }
  if (status.control.test_mode) {
    detail.textContent += " Test mode is on - trades stop just short of execution.";
  }
}

async function refreshGlobal() {
    const [status, po, dash, channels, settings, activeSessions] = await Promise.all([
      fetchJSON("/api/status"),
      fetchJSON("/api/pocket-option/status"),
      fetchJSON("/api/dashboard"),
      fetchJSON("/api/channels"),
      fetchJSON("/api/settings"),
      fetchJSON("/api/sessions/active-list"),
    ]);
    document.getElementById("hero-label-text").textContent = "Today's Performance";
    document.getElementById("session-pl-label").textContent =
      activeSessions.length > 1 ? "Active sessions P/L (combined)" : "Active session P/L";
    document.getElementById("goal-progress-wrap").style.display = "none";
    document.getElementById("broker-account-chip").innerHTML = "";

    renderStatusLine(status, po, channels);
    renderStartCta(activeSessions.length ? activeSessions[0] : null);

    // ---- Hero: Today's Performance ----
    const daily = dash.statistics.daily;
    const dailyPlEl = document.getElementById("daily-pl");
    dailyPlEl.textContent = fmtMoney(daily.profit_loss);
    dailyPlEl.className = "fund-hero-value count-up " + plClass(daily.profit_loss);
    document.getElementById("daily-pl-caption").textContent =
      daily.total_closed > 0 ? `${daily.wins} win${daily.wins === 1 ? "" : "s"}, ${daily.losses} loss${daily.losses === 1 ? "" : "es"} today` : "No trades closed yet today.";
    document.getElementById("win-rate").textContent = daily.win_rate !== null ? (daily.win_rate * 100).toFixed(1) + "%" : "-";
    document.getElementById("trades-today").textContent = daily.total_closed;

    const sessionPlEl = document.getElementById("session-pl");
    if (activeSessions.length) {
      const combinedPnl = activeSessions.reduce((sum, s) => sum + (s.realized_pnl || 0), 0);
      sessionPlEl.textContent = fmtMoney(combinedPnl);
      sessionPlEl.className = "value " + plClass(combinedPnl);
    } else {
      sessionPlEl.textContent = "No active session";
      sessionPlEl.className = "value faint";
    }

    // ---- Risk: plain language first, numbers on demand ----
    const riskLine = document.getElementById("risk-line");
    const riskDiagnostics = document.getElementById("risk-diagnostics");
    const maxLoss = settings.effective.max_daily_loss;
    if (status.control.emergency_stop) {
      riskLine.innerHTML = '<span class="dot danger"></span> Emergency stop is active';
    } else if (maxLoss > 0 && daily.profit_loss <= -0.8 * maxLoss) {
      riskLine.innerHTML = '<span class="dot warn"></span> Approaching your daily loss limit';
    } else {
      riskLine.innerHTML = '<span class="dot on"></span> Within all your risk limits';
    }
    document.getElementById("risk-details").innerHTML = `
      <div>Today's P/L: ${fmtMoney(daily.profit_loss)} of a -$${maxLoss || "unlimited"} daily loss limit</div>
      <div>Max amount per trade: $${settings.effective.max_trade_amount}</div>
      <div>Max trades per day: ${settings.effective.max_trades_per_day || "unlimited"}</div>
    `;
    riskDiagnostics.style.display = "block";

    // ---- Recent activity ----
    const enabledChannels = channels.filter(c => c.enabled);
    document.getElementById("activity-source").textContent = enabledChannels.length
      ? `Watching: ${enabledChannels.map(c => c.title || c.username).join(", ")}`
      : "No signal sources selected yet.";

    const recent = dash.recent_trades.slice(0, 5);
    const activityList = document.getElementById("activity-list");
    if (recent.length) {
      activityList.innerHTML = recent.map(t => {
        let resultLabel = "Pending";
        let resultClass = "neutral";
        if (t.execution_status === "result_win") { resultLabel = "Won"; resultClass = "pos"; }
        else if (t.execution_status === "result_loss") { resultLabel = "Lost"; resultClass = "neg"; }
        return `
          <div class="activity-row">
            <div>
              <div class="what">${escapeHtml(t.asset || "-")} ${escapeHtml(t.direction || "")}</div>
              <div class="when">${timeAgo(t.received_at)}</div>
            </div>
            <div class="${resultClass}" style="font-weight:600; font-size:13.5px;">${resultLabel}</div>
          </div>
        `;
      }).join("");
    } else {
      activityList.innerHTML = '<div class="empty-panel"><span class="empty-panel-mark"><svg viewBox="0 0 100 100"><path fill-rule="evenodd" fill="#FFFFFF" d="M 54 14 L 84 70 L 63 83 L 51 66 L 39 83 L 18 70 Z M 50 34 L 65 54 L 58 54 L 50 43 L 42 54 L 35 54 Z"/></svg></span>No signals yet.</div>';
    }
}

async function callControl(path) {
  try {
    await fetchJSON(path, { method: "POST" });
  } catch (e) {
    alert("Action failed: " + e.message);
  }
  refreshAll();
}

function confirmEmergencyStop() {
  if (confirm("Emergency stop: no new signals will be executed until you clear it. Continue?")) {
    callControl("/api/control/emergency-stop");
  }
}

(async () => {
  currentUser = await AximShell.init({ active: "dashboard" });
  if (!currentUser) return;
  renderGreeting(currentUser);
  await loadFundSelector();
  loadOnboardingChecklist();
  refreshAll();
  setInterval(refreshAll, 5000);
  AximShell.subscribeEvents({
    "trade.closed": { onEvent: refreshAll, onResync: refreshAll },
  });
})();
</script>
