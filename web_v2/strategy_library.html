<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Advanced Library - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Advanced Library", "All 27 strategies. Most people don't need this page - if you're not sure, start with the 6 recommended ones.");
document.querySelector(".subtitle").insertAdjacentHTML("afterend", `
  <div class="detail-topnav">
    <a class="back-link" href="strategy.html">&larr; Money Management Studio</a>
  </div>
`);

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}
function tierColor(level) {
  return level === "Low" ? "var(--green)" : level === "Medium" ? "#b5750a" : "var(--red)";
}
const GROWTH_ICON = { "Capital Preservation": "\u{1F6E1}️", "Growth": "\u{1F4C8}", "Recovery-Focused": "\u{1F504}", "Predictable": "⚖️" };

function splitRiskValue(text) {
  let m = text.match(/^(\d+(\.\d+)?%)\s+(.*)$/);
  if (m) return { big: m[1], small: m[3] };
  m = text.match(/^Fixed (\$\d+(\.\d+)?)\s+(.*)$/);
  if (m) return { big: m[1], small: m[3] + " (fixed)" };
  m = text.match(/^Dynamic (\d+(\.\d+)?%)\s+(.*)$/);
  if (m) return { big: m[1], small: "of balance, recalculated every trade" };
  return { big: "Dynamic", small: "sizing computed each trade" };
}

// Same premium-card pattern as the starter grid (design-system.css
// .strategy-card v3) - real numbers kept, presented as a hero risk
// figure + compact pills instead of prose. Exact breakdown is one tap
// away on the detail page.
function renderMechPills(s) {
  const r = s.rules;
  const pills = [];
  if (r.martingale) pills.push(`<span class="mech-pill martingale">\u{1F504} Recovery <b>max ${r.martingale.max_exposure.replace(' of bankroll','')}</b></span>`);
  if (r.compounding) pills.push(`<span class="mech-pill compounding">\u{1F4C8} Compounding ${r.compounding.max_risk_cap === "No cap configured" ? "" : `<b>up to ${r.compounding.max_risk_cap}</b>`}</span>`);
  if (r.vault) pills.push(`<span class="mech-pill vault">\u{1F512} Vault <b>${r.vault.percent}</b></span>`);
  if (!pills.length) pills.push(`<span class="mech-pill predictable">✓ Fixed stake, never changes</span>`);
  return pills.join("");
}

let allStrategies = [];

function render(filter) {
  const list = filter === "all" ? allStrategies : allStrategies.filter(s => {
    if (filter === "martingale") return s.uses_martingale;
    if (filter === "compounding") return s.uses_compounding;
    if (filter === "vault") return s.uses_vault;
    if (filter === "low") return s.risk_level === "Low";
    return true;
  });
  document.getElementById("results").innerHTML = list.map(s => {
    const risk = splitRiskValue(s.rules.risk_per_trade);
    return `
    <a class="strategy-card card-interactive" href="strategy_detail.html?id=${s.id}" style="--tier-color:${tierColor(s.risk_level)};">
      <div class="card-body">
        <div class="sec-title">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
            <div class="s-name">${s.name}</div>
            <span title="${s.growth_label}" style="font-size:20px; flex-shrink:0;">${GROWTH_ICON[s.growth_label] || ""}</span>
          </div>
          <div class="s-desc-clamp">${s.description}</div>
        </div>
        <div class="sec-hero">
          <div class="hero-risk-label">Risk per trade</div>
          <div class="hero-risk-value">${risk.big}</div>
          <div class="hero-risk-sub">${risk.small}</div>
        </div>
        <div class="sec-pills">${renderMechPills(s)}</div>
        <div class="sec-usecase"><div class="usecase-text">${s.who_should_use}</div></div>
        <div class="sec-footer"><span class="learn-more-pill">View Strategy &rarr;</span></div>
      </div>
    </a>
  `;
  }).join("");
}

async function load() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading library...</div>`;
  try {
    const data = await fetchPreview("/strategies/library");
    allStrategies = data.strategies;
    content.innerHTML = `
      <div class="row" style="margin-bottom:14px; gap:6px;">
        <button class="btn btn-secondary" data-f="all">All (${allStrategies.length})</button>
        <button class="btn btn-secondary" data-f="low">Low risk</button>
        <button class="btn btn-secondary" data-f="martingale">Uses Martingale</button>
        <button class="btn btn-secondary" data-f="compounding">Uses Compounding</button>
        <button class="btn btn-secondary" data-f="vault">Uses Vault</button>
      </div>
      <div class="grid" id="results"></div>
    `;
    document.querySelectorAll("[data-f]").forEach(b => b.onclick = () => render(b.dataset.f));
    render("all");
  } catch (e) {
    content.innerHTML = `<div class="card"><div class="card-label">Error</div>${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
