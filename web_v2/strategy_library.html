<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Advanced Library - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Advanced Library", "All 27 strategies. Most people don't need this page - if you're not sure, start with the 6 recommended ones.");

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}

// Same dense, numbers-first pattern as the starter grid - the Advanced
// Library is still bankroll rules, not branding, just more of them.
function renderMoneyRules(s) {
  const r = s.rules;
  let html = `<div class="money-rules">
    <div class="rule-row"><span class="rule-label">Risk per trade</span><span class="rule-value">${r.risk_per_trade}</span></div>
    <div class="rule-row"><span class="rule-label">Sizing method</span><span class="rule-value">${r.sizing_method}</span></div>`;

  if (r.martingale) {
    html += `<div class="mechanism-block martingale">
      <div class="mech-title">Martingale: ${r.martingale.steps} step(s)</div>
      Ladder: ${r.martingale.ladder}<br>${r.martingale.reset_rule}<br>Max exposure: ${r.martingale.max_exposure}
    </div>`;
  }
  if (r.compounding) {
    html += `<div class="mechanism-block compounding">
      <div class="mech-title">Compounding (${r.compounding.trigger})</div>
      ${r.compounding.increase_rule}<br>${r.compounding.reset_rule}<br>Maximum risk: ${r.compounding.max_risk_cap}
    </div>`;
  }
  if (r.vault) {
    html += `<div class="mechanism-block vault">
      <div class="mech-title">Profit Vault</div>
      Moves ${r.vault.percent} of profit to Protected Balance (${r.vault.trigger})
    </div>`;
  }

  html += `<div class="rule-row"><span class="rule-label">Profit target</span><span class="rule-value">${r.profit_target}</span></div>
    <div class="rule-row"><span class="rule-label">Loss limit</span><span class="rule-value">${r.loss_limit}</span></div>
  </div>`;
  return html;
}

let allStrategies = [];

function render(filter) {
  const list = filter === "all" ? allStrategies : allStrategies.filter(s => {
    if (filter === "martingale") return s.uses_martingale;
    if (filter === "compounding") return s.uses_compounding;
    if (filter === "vault") return s.uses_vault;
    if (filter === "low") return s.risk_level === "Low";
    return true;
  });
  document.getElementById("results").innerHTML = list.map(s => `
    <a class="strategy-card" href="strategy_detail.html?id=${s.id}">
      <div class="s-name">${s.name}</div>
      <div class="s-desc">${s.description}</div>
      <div style="margin-bottom:8px;"><span class="badge ${riskBadgeClass(s.risk_level)}">${s.risk_level} risk</span></div>
      ${renderMoneyRules(s)}
    </a>
  `).join("");
}

async function load() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading library...</div>`;
  try {
    const data = await fetchPreview("/strategies/library");
    allStrategies = data.strategies;
    content.innerHTML = `
      <div class="row" style="margin-bottom:14px; gap:6px;">
        <button class="btn btn-secondary" data-f="all">All (${allStrategies.length})</button>
        <button class="btn btn-secondary" data-f="low">Low risk</button>
        <button class="btn btn-secondary" data-f="martingale">Uses Martingale</button>
        <button class="btn btn-secondary" data-f="compounding">Uses Compounding</button>
        <button class="btn btn-secondary" data-f="vault">Uses Vault</button>
      </div>
      <div class="grid" id="results"></div>
    `;
    document.querySelectorAll("[data-f]").forEach(b => b.onclick = () => render(b.dataset.f));
    render("all");
  } catch (e) {
    content.innerHTML = `<div class="card"><div class="card-label">Error</div>${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
