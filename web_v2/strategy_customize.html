<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Custom Strategy Builder - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){var t=localStorage.getItem('axim-theme')||'system';if(t!=='system')document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="design-system.css">
<style>
  .warning-box { background: var(--red-bg); border: 1.5px solid var(--red); border-radius: 10px; padding: 12px 14px; font-size: 12.5px; color: var(--red); font-weight: 600; line-height: 1.5; margin-top: 10px; }
  .info-box { background: var(--canvas); border-radius: 10px; padding: 12px 14px; font-size: 12.5px; color: var(--ink-dim); line-height: 1.5; }
</style>
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="theme.js"></script>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Custom Strategy Builder", "AXIM Trader's signature feature - build unlimited bankroll rules of your own. Nothing is saved until you confirm, and no official strategy is ever overwritten.");
document.querySelector(".subtitle").insertAdjacentHTML("afterend", `
  <div class="detail-topnav">
    <a class="back-link" href="strategy.html">&larr; Back to Money Management Studio</a>
  </div>
`);

const params = new URLSearchParams(location.search);
const baseKey = params.get("base");
const STORAGE_KEY = "axim_preview_custom_profiles_v2";

function loadSaved() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch (e) { return []; } }
function saveSaved(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
function fmtMoney(n) { return "$" + Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }); }

// Maps one of the 4 official strategies' real rules onto this builder's
// control taxonomy, for "Create From This Template" - a starting point
// only. Saving here NEVER modifies the original locked strategy.
function presetFromBase(base) {
  if (!base) {
    return { sizing_mode: "percent", percent: 1, fixed: 10, kelly_p: 55, kelly_b: 0.88, kelly_fraction: 0.5,
      martingale: "off", mart_custom_mult: 2, compounding: "off", comp_every_x: 3, comp_profit_target: 100,
      vault: "none", vault_custom: 15, growth_threshold: "50", growth_custom: 60,
      daily_stop_loss: 0, daily_profit_target: 0, session_stop: 0, cooldown_minutes: 0 };
  }
  const map = {
    capital_preservation: { sizing_mode: "percent", percent: 1, martingale: "off", compounding: "off", vault: "25", growth_threshold: "125" },
    growth_accelerator: { sizing_mode: "percent", percent: 5, martingale: "off", compounding: "custom", vault: "25", growth_threshold: "125" },
    alternating_compound: { sizing_mode: "percent", percent: 2.5, martingale: "off", compounding: "custom", vault: "none", growth_threshold: "50" },
    recovery_ladder: { sizing_mode: "percent", percent: 1, martingale: "2", mart_custom_mult: 2, compounding: "off", vault: "none", growth_threshold: "100" },
  };
  const m = map[base.key] || {};
  return {
    sizing_mode: m.sizing_mode || "percent", percent: m.percent ?? 1, fixed: 10, kelly_p: 55, kelly_b: 0.88, kelly_fraction: 0.5,
    martingale: m.martingale || "off", mart_custom_mult: m.mart_custom_mult ?? 2,
    compounding: m.compounding || "off", comp_every_x: 3, comp_profit_target: 100,
    vault: m.vault || "none", vault_custom: 15,
    growth_threshold: m.growth_threshold || "50", growth_custom: 60,
    daily_stop_loss: 0, daily_profit_target: 0, session_stop: 0, cooldown_minutes: 0,
  };
}

function buildForm(base, preset) {
  const baseName = base ? base.name : null;
  document.getElementById("page-content").innerHTML = `
    ${baseName ? `<div class="info-box" style="margin-bottom:16px;">Starting from <b>${baseName}</b>'s rules as a template. Change anything below - "${baseName}" itself is never modified, and nothing here is saved until you confirm.</div>` : ""}
    <div class="row" style="align-items:flex-start; gap:16px;">
      <div style="flex:2; min-width:0;">
        <form id="custom-form" onsubmit="return false;">

          <div class="card">
            <div class="card-label">Profile identity</div>
            <div class="field">
              <label>Profile name</label>
              <input type="text" id="f-name" value="${baseName ? baseName + " (Custom)" : "My Custom Strategy"}">
            </div>
            <div class="field">
              <label>Starting bankroll ($)</label>
              <input type="number" id="f-bankroll" min="1" step="1" value="1000">
              <div class="hint">Used only to illustrate this profile's rules below - your real Fund balance is unaffected.</div>
            </div>
          </div>

          <div class="card">
            <div class="card-label">Position sizing</div>
            <div class="field">
              <label>Method</label>
              <select id="f-sizing-mode">
                <option value="fixed" ${preset.sizing_mode === "fixed" ? "selected" : ""}>Fixed dollar sizing</option>
                <option value="percent" ${preset.sizing_mode === "percent" ? "selected" : ""}>Percentage sizing</option>
                <option value="kelly" ${preset.sizing_mode === "kelly" ? "selected" : ""}>Kelly sizing</option>
                <option value="dynamic" ${preset.sizing_mode === "dynamic" ? "selected" : ""}>Dynamic sizing (recalculates every trade)</option>
              </select>
            </div>
            <div id="sizing-fixed" class="sizing-sub"><div class="field"><label>Fixed amount ($)</label><input type="number" id="f-fixed" step="1" min="1" value="${preset.fixed}"></div></div>
            <div id="sizing-percent" class="sizing-sub"><div class="field"><label>Percent of bankroll (%)</label><input type="number" id="f-percent" step="0.1" min="0.1" value="${preset.percent}"></div></div>
            <div id="sizing-kelly" class="sizing-sub">
              <div class="field-row">
                <div class="field"><label>Estimated win rate (%)</label><input type="number" id="f-kelly-p" step="1" min="1" max="99" value="${preset.kelly_p}"></div>
                <div class="field"><label>Estimated payout (0-1)</label><input type="number" id="f-kelly-b" step="0.01" min="0.01" value="${preset.kelly_b}"></div>
              </div>
              <div class="field"><label>Kelly fraction (0.5 = half-Kelly, recommended)</label><input type="number" id="f-kelly-fraction" step="0.05" min="0.05" max="1" value="${preset.kelly_fraction}"></div>
            </div>
            <div id="sizing-dynamic" class="sizing-sub">
              <div class="field"><label>Percent of current balance (%)</label><input type="number" id="f-dynamic-percent" step="0.1" min="0.1" value="${preset.percent}"></div>
              <div class="hint">Recalculated fresh every single trade from your live balance - the only sizing method with no fixed baseline at all.</div>
            </div>
          </div>

          <div class="card">
            <div class="card-label">Martingale</div>
            <div class="field">
              <label>Recovery steps after a loss</label>
              <select id="f-martingale">
                <option value="off" ${preset.martingale === "off" ? "selected" : ""}>Off</option>
                <option value="1" ${preset.martingale === "1" ? "selected" : ""}>1 step</option>
                <option value="2" ${preset.martingale === "2" ? "selected" : ""}>2 steps</option>
                <option value="3" ${preset.martingale === "3" ? "selected" : ""}>3 steps</option>
                <option value="unlimited" ${preset.martingale === "unlimited" ? "selected" : ""}>Unlimited</option>
                <option value="custom" ${preset.martingale === "custom" ? "selected" : ""}>Custom multiplier</option>
              </select>
            </div>
            <div id="mart-mult-field" class="field" style="display:none;">
              <label>Multiplier per step</label>
              <input type="number" id="f-mart-mult" step="0.1" min="1" value="${preset.mart_custom_mult}">
            </div>
            <div id="mart-unlimited-warning" style="display:none;">
              <div class="warning-box">⚠ Unlimited martingale has no cap. A losing streak of just 10-12 trades in a row can consume an entire bankroll, no matter how small the base stake is. AXIM strongly recommends a capped option (1-3 steps) instead - Unlimited is available here because you asked for full control, not because it's recommended.</div>
            </div>
          </div>

          <div class="card">
            <div class="card-label">Compounding</div>
            <div class="field">
              <label>When risk increases</label>
              <select id="f-compounding">
                <option value="off" ${preset.compounding === "off" ? "selected" : ""}>Off</option>
                <option value="every_win" ${preset.compounding === "every_win" ? "selected" : ""}>Every win</option>
                <option value="every_x_wins" ${preset.compounding === "every_x_wins" ? "selected" : ""}>Every X wins</option>
                <option value="daily" ${preset.compounding === "daily" ? "selected" : ""}>Daily</option>
                <option value="weekly" ${preset.compounding === "weekly" ? "selected" : ""}>Weekly</option>
                <option value="profit_target" ${preset.compounding === "profit_target" ? "selected" : ""}>Profit target</option>
                <option value="custom" ${preset.compounding === "custom" ? "selected" : ""}>Custom</option>
              </select>
            </div>
            <div id="comp-every-x-field" class="field" style="display:none;">
              <label>X (number of wins)</label>
              <input type="number" id="f-comp-every-x" step="1" min="2" value="${preset.comp_every_x}">
            </div>
            <div id="comp-profit-target-field" class="field" style="display:none;">
              <label>Profit target ($)</label>
              <input type="number" id="f-comp-profit-target" step="1" min="1" value="${preset.comp_profit_target}">
            </div>
            <div id="comp-custom-field" class="field" style="display:none;">
              <label>Describe your custom compounding rule</label>
              <input type="text" id="f-comp-custom-desc" placeholder="e.g. increase risk 0.5% for every $250 of profit">
            </div>
          </div>

          <div class="card">
            <div class="card-label">Vault</div>
            <div class="field">
              <label>Percent of profit vaulted</label>
              <select id="f-vault">
                <option value="none" ${preset.vault === "none" ? "selected" : ""}>None</option>
                <option value="10" ${preset.vault === "10" ? "selected" : ""}>10%</option>
                <option value="25" ${preset.vault === "25" ? "selected" : ""}>25%</option>
                <option value="50" ${preset.vault === "50" ? "selected" : ""}>50%</option>
                <option value="custom" ${preset.vault === "custom" ? "selected" : ""}>Custom</option>
              </select>
            </div>
            <div id="vault-custom-field" class="field" style="display:none;">
              <label>Custom vault percent (%)</label>
              <input type="number" id="f-vault-custom" step="1" min="1" max="100" value="${preset.vault_custom}">
            </div>
          </div>

          <div class="card">
            <div class="card-label">Growth threshold</div>
            <div class="field">
              <label>Position size recalculates once Active Bankroll grows this much above baseline</label>
              <select id="f-growth-threshold">
                <option value="25" ${preset.growth_threshold === "25" ? "selected" : ""}>25%</option>
                <option value="50" ${preset.growth_threshold === "50" ? "selected" : ""}>50%</option>
                <option value="75" ${preset.growth_threshold === "75" ? "selected" : ""}>75%</option>
                <option value="100" ${preset.growth_threshold === "100" ? "selected" : ""}>100%</option>
                <option value="125" ${preset.growth_threshold === "125" ? "selected" : ""}>125%</option>
                <option value="custom" ${preset.growth_threshold === "custom" ? "selected" : ""}>Custom</option>
              </select>
            </div>
            <div id="growth-custom-field" class="field" style="display:none;">
              <label>Custom threshold (%)</label>
              <input type="number" id="f-growth-custom" step="1" min="1" value="${preset.growth_custom}">
            </div>
          </div>

          <div class="card">
            <div class="card-label">Session controls</div>
            <div class="field-row">
              <div class="field"><label>Daily stop loss ($, 0 = off)</label><input type="number" id="f-daily-stop-loss" step="1" min="0" value="${preset.daily_stop_loss}"></div>
              <div class="field"><label>Daily profit target ($, 0 = off)</label><input type="number" id="f-daily-profit-target" step="1" min="0" value="${preset.daily_profit_target}"></div>
            </div>
            <div class="field-row">
              <div class="field"><label>Session stop ($, 0 = off)</label><input type="number" id="f-session-stop" step="1" min="0" value="${preset.session_stop}"></div>
              <div class="field"><label>Cooldown after a loss (minutes, 0 = off)</label><input type="number" id="f-cooldown" step="1" min="0" value="${preset.cooldown_minutes}"></div>
            </div>
            <div class="info-box">Emergency Stop always applies immediately, across every strategy including this one - it can never be disabled or configured away, here or anywhere else in AXIM.</div>
          </div>
        </form>
      </div>

      <div style="flex:1; position:sticky; top:40px;">
        <div class="card">
          <div class="card-label">Your plan in plain English</div>
          <div id="live-summary" class="money-rules"></div>
        </div>
        <div class="card">
          <div class="card-label">Save</div>
          <p style="font-size:12px; color:var(--ink-dim); margin:0 0 10px;">Saved locally to this preview browser only - never sent to the server${baseName ? `, and "${baseName}" itself is never modified` : ""}.</p>
          <button class="btn btn-primary" style="width:100%; justify-content:center;" id="save-btn">Save as New Profile</button>
          <div id="save-confirm" style="display:none; margin-top:10px; font-size:12.5px; color:var(--green); font-weight:600;"></div>
        </div>
        <div class="card" id="saved-list-card" style="display:none;">
          <div class="card-label">Saved custom profiles (this preview)</div>
          <div id="saved-list"></div>
        </div>
      </div>
    </div>
  `;
}

function showSizingSub(mode) {
  ["fixed", "percent", "kelly", "dynamic"].forEach(m => {
    document.getElementById(`sizing-${m}`).style.display = m === mode ? "block" : "none";
  });
}

function gatherForm() {
  const sizingMode = document.getElementById("f-sizing-mode").value;
  const martingale = document.getElementById("f-martingale").value;
  const compounding = document.getElementById("f-compounding").value;
  const vault = document.getElementById("f-vault").value;
  const growthThreshold = document.getElementById("f-growth-threshold").value;
  return {
    name: document.getElementById("f-name").value.trim(),
    bankroll: parseFloat(document.getElementById("f-bankroll").value) || 1000,
    sizing_mode: sizingMode,
    fixed_amount: parseFloat(document.getElementById("f-fixed").value) || 0,
    percent_of_bankroll: parseFloat(document.getElementById("f-percent").value) || 0,
    kelly_win_rate: parseFloat(document.getElementById("f-kelly-p").value) || 0,
    kelly_payout: parseFloat(document.getElementById("f-kelly-b").value) || 0,
    kelly_fraction: parseFloat(document.getElementById("f-kelly-fraction").value) || 0.5,
    dynamic_percent: parseFloat(document.getElementById("f-dynamic-percent").value) || 0,
    martingale, martingale_multiplier: martingale === "custom" ? (parseFloat(document.getElementById("f-mart-mult").value) || 2) : (martingale === "unlimited" ? null : (parseFloat(martingale) ? 2 : null)),
    compounding,
    compounding_every_x: parseInt(document.getElementById("f-comp-every-x").value, 10) || 3,
    compounding_profit_target: parseFloat(document.getElementById("f-comp-profit-target").value) || 100,
    compounding_custom_desc: (document.getElementById("f-comp-custom-desc") || {}).value || "",
    vault, vault_custom_percent: parseFloat(document.getElementById("f-vault-custom").value) || 0,
    growth_threshold: growthThreshold, growth_custom_percent: parseFloat(document.getElementById("f-growth-custom").value) || 0,
    daily_stop_loss: parseFloat(document.getElementById("f-daily-stop-loss").value) || 0,
    daily_profit_target: parseFloat(document.getElementById("f-daily-profit-target").value) || 0,
    session_stop: parseFloat(document.getElementById("f-session-stop").value) || 0,
    cooldown_minutes: parseInt(document.getElementById("f-cooldown").value, 10) || 0,
  };
}

function martingaleLabel(f) {
  if (f.martingale === "off") return "Off - a loss never changes your next stake.";
  if (f.martingale === "unlimited") return "Unlimited steps - no cap on how far the ladder can climb.";
  if (f.martingale === "custom") return `Custom multiplier: ${f.martingale_multiplier}x per step.`;
  return `${f.martingale} step(s), 2x multiplier per step (default).`;
}
function compoundingLabel(f) {
  const map = { off: "Off - risk never increases.", every_win: "Increases after every win.", daily: "Increases daily.", weekly: "Increases weekly." };
  if (map[f.compounding]) return map[f.compounding];
  if (f.compounding === "every_x_wins") return `Increases every ${f.compounding_every_x} wins.`;
  if (f.compounding === "profit_target") return `Increases once $${f.compounding_profit_target} profit is reached.`;
  if (f.compounding === "custom") return f.compounding_custom_desc || "Custom rule (not yet described).";
  return "Off";
}
function vaultLabel(f) {
  if (f.vault === "none") return "No profit is vaulted.";
  if (f.vault === "custom") return `${f.vault_custom_percent}% of profit vaulted.`;
  return `${f.vault}% of profit vaulted.`;
}
function growthLabel(f) {
  const pct = f.growth_threshold === "custom" ? f.growth_custom_percent : f.growth_threshold;
  return `Position size recalculates once Active Bankroll grows +${pct}% above baseline.`;
}
function sizingLabel(f) {
  if (f.sizing_mode === "fixed") return `Fixed $${f.fixed_amount} every trade.`;
  if (f.sizing_mode === "percent") return `${f.percent_of_bankroll}% of bankroll per trade.`;
  if (f.sizing_mode === "kelly") return `Kelly sizing (${f.kelly_fraction}x fraction) from an estimated ${f.kelly_win_rate}% win rate / ${f.kelly_payout} payout.`;
  if (f.sizing_mode === "dynamic") return `${f.dynamic_percent}% of your current balance, recalculated every trade.`;
  return "";
}

function updateSummary() {
  const f = gatherForm();
  let html = `
    <div class="rule-row"><span class="rule-label">Sizing</span><span class="rule-value">${sizingLabel(f)}</span></div>
    <div class="mechanism-block martingale"><div class="mech-title">Martingale</div>${martingaleLabel(f)}</div>
    <div class="mechanism-block compounding"><div class="mech-title">Compounding</div>${compoundingLabel(f)}</div>
    <div class="mechanism-block vault"><div class="mech-title">Vault</div>${vaultLabel(f)}</div>
    <div class="rule-row"><span class="rule-label">Growth threshold</span><span class="rule-value">${growthLabel(f).replace("Position size recalculates once Active Bankroll grows ", "")}</span></div>
    <div class="rule-row"><span class="rule-label">Daily stop loss</span><span class="rule-value">${f.daily_stop_loss > 0 ? fmtMoney(f.daily_stop_loss) : "Off"}</span></div>
    <div class="rule-row"><span class="rule-label">Daily profit target</span><span class="rule-value">${f.daily_profit_target > 0 ? fmtMoney(f.daily_profit_target) : "Off"}</span></div>
    <div class="rule-row"><span class="rule-label">Session stop</span><span class="rule-value">${f.session_stop > 0 ? fmtMoney(f.session_stop) : "Off"}</span></div>
    <div class="rule-row"><span class="rule-label">Cooldown after a loss</span><span class="rule-value">${f.cooldown_minutes > 0 ? f.cooldown_minutes + " min" : "Off"}</span></div>
  `;
  document.getElementById("live-summary").innerHTML = html;
  document.getElementById("mart-mult-field").style.display = f.martingale === "custom" ? "block" : "none";
  document.getElementById("mart-unlimited-warning").style.display = f.martingale === "unlimited" ? "block" : "none";
  document.getElementById("comp-every-x-field").style.display = f.compounding === "every_x_wins" ? "block" : "none";
  document.getElementById("comp-profit-target-field").style.display = f.compounding === "profit_target" ? "block" : "none";
  document.getElementById("comp-custom-field").style.display = f.compounding === "custom" ? "block" : "none";
  document.getElementById("vault-custom-field").style.display = f.vault === "custom" ? "block" : "none";
  document.getElementById("growth-custom-field").style.display = f.growth_threshold === "custom" ? "block" : "none";
}

function renderSavedList() {
  const list = loadSaved();
  const card = document.getElementById("saved-list-card");
  if (!card) return;
  if (!list.length) { card.style.display = "none"; return; }
  card.style.display = "block";
  document.getElementById("saved-list").innerHTML = list.map((p, i) => `
    <div class="saved-profile-row">
      <div><div class="sp-name">${p.name}</div><div class="sp-meta">${p.based_on ? "Based on " + p.based_on : "Built from scratch"} - saved ${new Date(p.saved_at).toLocaleString()}</div></div>
      <button class="row-remove" title="Remove" onclick="removeSaved(${i})">&times;</button>
    </div>
  `).join("");
}
function removeSaved(i) {
  const list = loadSaved();
  list.splice(i, 1);
  saveSaved(list);
  renderSavedList();
}

function wireForm(base) {
  showSizingSub(document.getElementById("f-sizing-mode").value);

  document.querySelectorAll("#custom-form input, #custom-form select").forEach(el => {
    el.oninput = updateSummary;
    el.onchange = updateSummary;
  });

  // Set AFTER the generic wiring loop above (which also assigns .onchange
  // to every select, f-sizing-mode included) - an .onchange assignment
  // replaces the previous one rather than stacking, so this must run
  // last or the sizing-sub toggle silently never fires.
  document.getElementById("f-sizing-mode").onchange = (e) => { showSizingSub(e.target.value); updateSummary(); };

  document.getElementById("save-btn").onclick = () => {
    const f = gatherForm();
    if (!f.name) { alert("Please give this profile a name."); return; }
    const list = loadSaved();
    list.push({ ...f, based_on: base ? base.name : null, base_key: base ? base.key : null, saved_at: new Date().toISOString() });
    saveSaved(list);
    const confirm = document.getElementById("save-confirm");
    confirm.style.display = "block";
    confirm.textContent = `Saved "${f.name}" to this preview browser.${base ? ` "${base.name}" itself is untouched.` : ""}`;
    renderSavedList();
  };

  updateSummary();
  renderSavedList();
}

async function init() {
  let base = null;
  if (baseKey) {
    try {
      base = await fetchPreview(`/strategies/${baseKey}`);
      if (base.error) base = null;
    } catch (e) { base = null; }
  }
  const preset = presetFromBase(base);
  buildForm(base, preset);
  wireForm(base);
}
init();
</script>
</body>
</html>
