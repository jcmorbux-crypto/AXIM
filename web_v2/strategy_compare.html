<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Compare Strategies - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){var t=localStorage.getItem('axim-theme')||'system';if(t!=='system')document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="theme.js"></script>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Compare Strategies", "All 4 official strategies, side by side.");

let allStrategies = [];

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}

async function render() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading comparison...</div>`;
  const rows = [
    ["Risk level", d => `<span class="badge ${riskBadgeClass(d.risk_level)}">${d.risk_level}</span>`],
    ["Personality", d => d.personality],
    ["Risk per trade", d => d.risk.headline],
    ["Martingale?", d => d.martingale.active ? "Yes - limited" : "No"],
    ["Compounding?", d => d.compounding.active ? "Yes" : "No"],
    ["Vault?", d => d.vault.active ? d.vault.percent + "% of profit" : "No"],
    ["Recalculates at", d => d.growth_recalc.active ? `+${d.growth_recalc.threshold_percent}% growth` : "Never"],
    ["Best for", d => `<span style="font-size:12px;">${d.best_for[0]}</span>`],
  ];
  content.innerHTML = `
    <div class="card" style="overflow-x:auto;">
      <table class="compare-table">
        <thead><tr><th></th>${allStrategies.map(d => `<th>${d.icon} ${d.name}</th>`).join("")}</tr></thead>
        <tbody>
          ${rows.map(([label, fn]) => `<tr><th>${label}</th>${allStrategies.map(d => `<td>${fn(d)}</td>`).join("")}</tr>`).join("")}
          <tr><th>Detail</th>${allStrategies.map(d => `<td><a href="strategy_detail.html?id=${d.key}">View full page →</a></td>`).join("")}</tr>
        </tbody>
      </table>
    </div>
    <div class="card" style="border-color:var(--brand); border-width:1.5px;">
      <div class="card-label">Want to see how these would have actually performed?</div>
      <p style="font-size:13px; margin:0;">These strategies have no intrinsic ROI or drawdown - Strategy Lab runs real backtests against a Signal Provider's actual historical signals.</p>
    </div>
  `;
}

async function load() {
  const data = await fetchPreview("/strategies");
  allStrategies = data.strategies;
  render();
}
load();
</script>
</body>
</html>
