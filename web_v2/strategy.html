<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Strategy - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Money Management Studio", "Six strategies to start with. Every card shows the real bankroll rules - click one for the full picture. Nothing is created until you say so.");

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}
function tierColor(level) {
  return level === "Low" ? "var(--green)" : level === "Medium" ? "#b5750a" : "var(--red)";
}
const GROWTH_ICON = { "Capital Preservation": "\u{1F6E1}️", "Growth": "\u{1F4C8}", "Recovery-Focused": "\u{1F504}", "Predictable": "⚖️" };

// Splits a prose risk_per_trade string into a big hero value + small
// caption (e.g. "1% of active bankroll" -> "1%" / "of active bankroll")
// so the card can show risk the way a price ticker shows a number:
// large and immediate, not buried in a label:value row.
function splitRiskValue(text) {
  let m = text.match(/^(\d+(\.\d+)?%)\s+(.*)$/);
  if (m) return { big: m[1], small: m[3] };
  m = text.match(/^Fixed (\$\d+(\.\d+)?)\s+(.*)$/);
  if (m) return { big: m[1], small: m[3] + " (fixed)" };
  m = text.match(/^Dynamic (\d+(\.\d+)?%)\s+(.*)$/);
  if (m) return { big: m[1], small: "of balance, recalculated every trade" };
  return { big: "Dynamic", small: "sizing computed each trade" };
}

// Constitution Q1/Q9 still holds - the real number, never a vague
// label - but presented as compact numeric PILLS instead of full
// prose sentences, so the card reads in seconds, not paragraphs. The
// exact ladder/milestone breakdown stays one tap away on the detail
// page (P2 "math is one click away, never zero").
function renderMechPills(s) {
  const r = s.rules;
  const pills = [];
  if (r.martingale) pills.push(`<span class="mech-pill martingale">\u{1F504} Recovery <b>max ${r.martingale.max_exposure.replace(' of bankroll','')}</b></span>`);
  if (r.compounding) pills.push(`<span class="mech-pill compounding">\u{1F4C8} Compounding ${r.compounding.max_risk_cap === "No cap configured" ? "" : `<b>up to ${r.compounding.max_risk_cap}</b>`}</span>`);
  if (r.vault) pills.push(`<span class="mech-pill vault">\u{1F512} Vault <b>${r.vault.percent}</b></span>`);
  if (!pills.length) pills.push(`<span class="mech-pill predictable">✓ Fixed stake, never changes</span>`);
  return pills.join("");
}

async function load() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading strategies...</div>`;
  try {
    const data = await fetchPreview("/strategies");
    content.innerHTML = `
      <div class="row" style="margin-bottom:16px; gap:10px;">
        <a class="btn btn-primary" href="strategy_wizard.html">✨ Find My Strategy</a>
        <a class="btn btn-secondary" href="strategy_compare.html">Compare Strategies</a>
        <a class="btn btn-secondary" href="strategy_library.html">Browse Advanced Library →</a>
      </div>
      <div class="grid">
        ${data.strategies.map(s => {
          if (s.is_custom_entry) {
            return `
              <a class="strategy-card card-interactive" href="strategy_customize.html?id=${s.id}" style="border-style:dashed;">
                <div class="card-body" style="align-items:center; justify-content:center; text-align:center;">
                  <div style="font-size:30px; margin-bottom:8px; color:var(--ink-faint);">+</div>
                  <div class="s-name">${s.name}</div>
                  <div class="s-desc">${s.description}</div>
                </div>
              </a>
            `;
          }
          const risk = splitRiskValue(s.rules.risk_per_trade);
          return `
          <a class="strategy-card card-interactive" href="strategy_detail.html?id=${s.id}" style="--tier-color:${tierColor(s.risk_level)};">
            <div class="card-body">
              <div class="sec-title">
                <div style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
                  <div class="s-name">${s.name}</div>
                  <span title="${s.growth_label}" style="font-size:20px; flex-shrink:0;">${GROWTH_ICON[s.growth_label] || ""}</span>
                </div>
                <div class="s-desc-clamp">${s.description}</div>
              </div>

              <div class="sec-hero">
                <div class="hero-risk-label">Risk per trade</div>
                <div class="hero-risk-value">${risk.big}</div>
                <div class="hero-risk-sub">${risk.small}</div>
              </div>

              <div class="sec-pills">${renderMechPills(s)}</div>

              <div class="sec-usecase">
                <div class="usecase-text">${s.who_should_use}</div>
              </div>

              <div class="sec-footer">
                <span class="learn-more-pill">Learn More &rarr;</span>
              </div>
            </div>
          </a>
        `;
        }).join("")}
      </div>
      <div class="card" style="margin-top:16px;">
        <div class="card-label">Not sure where to start?</div>
        <p style="font-size:13px; color:var(--ink-dim); margin:0 0 10px;">Answer 4 quick questions and get one clear recommendation - most people decide in under 3 minutes.</p>
        <a class="btn btn-primary" href="strategy_wizard.html">✨ Find My Strategy</a>
      </div>
      <div class="card">
        <div class="card-label">Already have a Signal Provider in mind?</div>
        <p style="font-size:13px; color:var(--ink-dim); margin:0 0 10px;">These cards explain how each strategy works, not how well it performed - a strategy has no ROI or drawdown on its own. Pick a provider and AXIM runs a real backtest of every compatible strategy against its actual historical signals.</p>
        <a class="btn btn-secondary" href="provider_analysis.html">Analyze with a Signal Provider &rarr;</a>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="card"><div class="card-label">Error</div>${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
