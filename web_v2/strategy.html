<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Strategy - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="shell.js"></script>
<script>
renderShell("strategy", "Money Management Studio", "Six strategies to start with. Every card shows the real bankroll rules - click one for the full picture. Nothing is created until you say so.");

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}

// Constitution Q1/Q9: the browsing grid keeps the one real headline
// number (risk per trade - never a vague label) plus a single plain-
// language sentence per enabled mechanism. The exact ladder/milestone
// breakdown still exists, unchanged, one tap away on the detail page
// (P2 "math is one click away, never zero") - nothing here is hidden,
// it's just not the first thing a beginner has to read.
//
// Card layout consistency: every card renders the SAME fixed-height
// sections (title, risk, rules, stats, footer) regardless of text
// length - see .strategy-card .card-sec in design-system.css. A card
// with less to say leaves whitespace in its section instead of
// shifting the divider below it upward.
function renderMechList(s) {
  const r = s.rules;
  const mech = [];
  if (r.martingale) mech.push(`Recovers losses: stake rises after a loss (max ${r.martingale.max_exposure} of bankroll), resets on a win`);
  if (r.compounding) mech.push(r.compounding.max_risk_cap === "No cap configured"
    ? "Grows with your balance: risk climbs automatically as you profit, with no maximum cap set yet"
    : `Grows with your balance: risk climbs up to ${r.compounding.max_risk_cap} as you profit`);
  if (r.vault) mech.push(`Auto-protects ${r.vault.percent} of profit into a safe balance`);
  if (!mech.length) mech.push("Stake never changes - completely predictable, every trade");
  return `<ul class="mech-list">${mech.map(m => `<li>${m}</li>`).join("")}</ul>`;
}

async function load() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading strategies...</div>`;
  try {
    const data = await fetchPreview("/strategies");
    content.innerHTML = `
      <div class="row" style="margin-bottom:16px; gap:10px;">
        <a class="btn btn-primary" href="strategy_wizard.html">✨ Find My Strategy</a>
        <a class="btn btn-secondary" href="strategy_compare.html">Compare Strategies</a>
        <a class="btn btn-secondary" href="strategy_library.html">Browse Advanced Library →</a>
      </div>
      <div class="grid">
        ${data.strategies.map(s => s.is_custom_entry ? `
          <a class="strategy-card" href="strategy_customize.html?id=${s.id}" style="border-style:dashed; align-items:center; justify-content:center; text-align:center;">
            <div style="font-size:28px; margin-bottom:8px;">+</div>
            <div class="s-name">${s.name}</div>
            <div class="s-desc">${s.description}</div>
          </a>
        ` : `
          <a class="strategy-card" href="strategy_detail.html?id=${s.id}">
            <div class="card-sec sec-title">
              <div class="s-name">${s.name}</div>
              <div class="s-desc-clamp">${s.description}</div>
            </div>
            <div class="card-sec sec-risk">
              <div style="display:flex; gap:6px; margin-bottom:8px;">
                <span class="badge ${riskBadgeClass(s.risk_level)}">${s.risk_level} risk</span>
                <span class="badge badge-flag-on">${s.growth_label}</span>
              </div>
              <div class="risk-stat">
                <div class="risk-stat-label">Risk per trade</div>
                <div class="risk-stat-value">${s.rules.risk_per_trade}</div>
              </div>
              <div style="font-size:11px; color:var(--ink-faint); margin-top:4px;">${s.rules.risk_model}</div>
            </div>
            <div class="card-sec sec-rules">${renderMechList(s)}</div>
            <div class="card-sec sec-usecase">
              <div class="rule-label" style="font-size:11px; margin-bottom:4px;">Who should use it</div>
              <div class="usecase-text">${s.who_should_use}</div>
            </div>
            <div class="card-sec sec-footer">See the exact rules &amp; worked examples &rarr;</div>
          </a>
        `).join("")}
      </div>
      <div class="card" style="margin-top:16px;">
        <div class="card-label">Not sure where to start?</div>
        <p style="font-size:13px; color:var(--ink-dim); margin:0 0 10px;">Answer 4 quick questions and get one clear recommendation - most people decide in under 3 minutes.</p>
        <a class="btn btn-primary" href="strategy_wizard.html">✨ Find My Strategy</a>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="card"><div class="card-label">Error</div>${e.message}</div>`;
  }
}
load();
</script>
</body>
</html>
