<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Strategy Detail - AXIM Trader</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="design-system.css">
</head>
<body>
<div class="shell" id="shell-root"></div>
<script src="shell.js"></script>
<script>
renderShell("strategy", "", "");
document.querySelector(".subtitle").insertAdjacentHTML("afterend", `
  <div class="detail-topnav">
    <a class="back-link" href="strategy.html">&larr; Money Management Studio</a>
    <div id="prev-next-nav" class="prev-next-nav"></div>
  </div>
`);

const params = new URLSearchParams(location.search);
const strategyId = params.get("id");

// Prev/Next browses within whichever catalog the current strategy
// belongs to: the 6 starters if it's one of them, otherwise the full
// 27-item Advanced Library. The synthetic "Custom Strategy" entry has
// no detail page, so it's excluded from both lists.
async function loadSiblingNav() {
  const nav = document.getElementById("prev-next-nav");
  try {
    const starters = (await fetchPreview("/strategies")).strategies.filter(s => !s.is_custom_entry);
    const inStarters = starters.some(s => String(s.id) === String(strategyId));
    const list = inStarters ? starters : (await fetchPreview("/strategies/library")).strategies;
    const idx = list.findIndex(s => String(s.id) === String(strategyId));
    if (idx === -1) { nav.innerHTML = ""; return; }
    const prev = idx > 0 ? list[idx - 1] : null;
    const next = idx < list.length - 1 ? list[idx + 1] : null;
    nav.innerHTML = `
      ${prev ? `<a href="strategy_detail.html?id=${prev.id}">&larr; ${prev.name}</a>` : `<span class="pn-spacer">&larr; ${inStarters ? "Start of the list" : "Start of the library"}</span>`}
      ${next ? `<a class="pn-next" href="strategy_detail.html?id=${next.id}">${next.name} &rarr;</a>` : `<span class="pn-spacer pn-next">${inStarters ? "End of the list" : "End of the library"} &rarr;</span>`}
    `;
  } catch (e) {
    nav.innerHTML = "";
  }
}

function riskBadgeClass(level) {
  return level === "Low" ? "badge-risk-low" : level === "Medium" ? "badge-risk-medium" : "badge-risk-high";
}

function renderMoneyRules(r) {
  let html = `<div class="money-rules">
    <div class="rule-row"><span class="rule-label">Risk per trade</span><span class="rule-value">${r.risk_per_trade}</span></div>
    <div class="rule-row"><span class="rule-label">Sizing method</span><span class="rule-value">${r.sizing_method}</span></div>
    <div class="rule-row"><span class="rule-label">Risk model</span><span class="rule-value">${r.risk_model}</span></div>`;
  if (r.martingale) {
    html += `<div class="mechanism-block martingale">
      <div class="mech-title">Martingale (Recovery Rule): ${r.martingale.steps} step(s)</div>
      Ladder: ${r.martingale.ladder}<br>${r.martingale.reset_rule}<br><b>Maximum exposure: ${r.martingale.max_exposure}</b>
    </div>`;
  }
  if (r.compounding) {
    html += `<div class="mechanism-block compounding">
      <div class="mech-title">Compounding (Growth Recalculation Rule) - ${r.compounding.trigger}</div>
      ${r.compounding.increase_rule}<br>${r.compounding.reset_rule}<br>Maximum risk: ${r.compounding.max_risk_cap}
    </div>`;
  }
  if (r.vault) {
    html += `<div class="mechanism-block vault"><div class="mech-title">Profit Vault (Vault Rule)</div>Moves ${r.vault.percent} of profit to Protected Balance (${r.vault.trigger})</div>`;
  }
  html += `<div class="rule-row"><span class="rule-label">Maximum exposure</span><span class="rule-value">${r.max_exposure}</span></div>
    <div class="rule-row"><span class="rule-label">Profit target</span><span class="rule-value">${r.profit_target}</span></div>
    <div class="rule-row"><span class="rule-label">Loss limit</span><span class="rule-value">${r.loss_limit}</span></div></div>`;
  return html;
}

async function loadDetail() {
  const content = document.getElementById("page-content");
  content.innerHTML = `<div class="progress-row"><span class="spinner"></span> Loading strategy...</div>`;
  try {
    const s = await fetchPreview(`/strategies/${strategyId}`);
    document.querySelector("h1").textContent = s.name;
    document.querySelector(".subtitle").textContent = s.description;

    content.innerHTML = `
      <div class="row" style="align-items:flex-start; gap:16px;">
        <div style="flex:2; min-width:0;">
          <div class="card">
            <div class="card-label">Plain-English explanation</div>
            <p style="font-size:13.5px; margin:0 0 8px;">${s.what_it_does}</p>
            <p style="font-size:13.5px; margin:0;">${s.how_it_works}</p>
          </div>

          <div class="card">
            <div class="row" style="gap:10px; margin-bottom:12px;">
              <span class="badge ${riskBadgeClass(s.risk_level)}">${s.risk_level} risk</span>
              <span class="badge badge-flag-on">${s.growth_label}</span>
            </div>
            <div class="card-label">Exact rule configuration</div>
            ${renderMoneyRules(s.rules)}
          </div>

          <div class="card">
            <div class="card-label">Worked example: your very next trade</div>
            <p style="font-size:12.5px; color:var(--ink-dim); margin:0 0 10px;">A mechanical illustration of the sizing rule above, not a performance projection - at a $1,000 bankroll, stake size $${s.scenarios.stake}:</p>
            <div class="scenario-pair">
              <div class="scenario-box win">
                <div class="sc-title">If it wins</div>
                <div class="sc-amount">+$${s.scenarios.win.profit.toFixed(2)}</div>
                <div style="font-size:12px; color:var(--ink-dim);">Balance: $1,000 &rarr; $${s.scenarios.win.new_balance}</div>
              </div>
              <div class="scenario-box loss">
                <div class="sc-title">If it loses</div>
                <div class="sc-amount">-$${Math.abs(s.scenarios.loss.loss).toFixed(2)}</div>
                <div style="font-size:12px; color:var(--ink-dim);">Balance: $1,000 &rarr; $${s.scenarios.loss.new_balance}</div>
              </div>
            </div>
          </div>

          <div class="card" style="border-color:var(--brand); border-width:1.5px;">
            <div class="card-label">Want real performance numbers?</div>
            <p style="font-size:13px; margin:0 0 12px;">A strategy alone has no ROI, drawdown, or win rate - those only exist once you combine it with a specific Signal Provider's actual historical signals, a starting bankroll, and a broker payout. Select a provider to run a real backtest across every compatible strategy, including this one.</p>
            <a class="btn btn-primary" href="provider_analysis.html">Analyze with a Signal Provider &rarr;</a>
          </div>

          <div class="row" style="gap:16px;">
            <div class="card" style="flex:1;">
              <div class="card-label">Best for</div>
              <p style="font-size:13px; margin:0; color:var(--green);">${s.best_for}</p>
            </div>
            <div class="card" style="flex:1;">
              <div class="card-label">Worst for</div>
              <p style="font-size:13px; margin:0; color:var(--red);">${s.worst_for}</p>
            </div>
          </div>
        </div>

        <div style="flex:1; position:sticky; top:40px;">
          <div class="card">
            <div class="card-label">Ready to use this?</div>
            <p style="font-size:12px; color:var(--ink-dim); margin:0 0 12px;">This template is only a starting point - nothing is created until you confirm.</p>
            <a class="btn btn-primary" style="width:100%; justify-content:center; margin-bottom:8px;" href="strategy_customize.html?id=${s.id}">Customize &amp; Use</a>
            <button class="btn btn-secondary" style="width:100%; justify-content:center; margin-bottom:8px;" id="use-default-btn">Use Default</button>
            <a class="btn btn-secondary" style="width:100%; justify-content:center;" href="strategy_compare.html">Compare</a>
          </div>
        </div>
      </div>
    `;

    document.getElementById("use-default-btn").onclick = () => {
      alert("Preview only - this button never creates a real profile in this environment. \"Save as New Profile\" (from Customize & Use) is stored locally in this preview only.");
    };
  } catch (e) {
    content.innerHTML = `<div class="card"><div class="card-label">Error</div>${e.message}</div>`;
  }
}

if (!strategyId) {
  document.getElementById("page-content").innerHTML = `<div class="card">No strategy selected. <a href="strategy.html">Back to Money Management Studio</a></div>`;
} else {
  loadDetail();
  loadSiblingNav();
}
</script>
</body>
</html>
